<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Galeri Pulsa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; }
        .modal.show { display: flex; }
        .modal-content { background: white; margin: auto; width: 90%; max-width: 420px; border-radius: 24px; overflow: hidden; }
        .modal-header { padding: 1rem; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
        .modal-body { padding: 1rem; max-height: 70vh; overflow-y: auto; }
        .modal-footer { padding: 1rem; display: flex; gap: 0.75rem; border-top: 1px solid #e2e8f0; }
        .btn { padding: 0.85rem 1rem; border-radius: 16px; font-weight: 600; transition: all 0.2s; }
        .btn-secondary { background: #94a3b8; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .close-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #f1f5f9; color: #475569; }
    </style>
</head>
<body>

    <!-- ============================================ -->
    <!--                MODAL PDAM                   -->
    <!-- ============================================ -->
    <div id="pdamModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="close-btn" onclick="closePDAM()"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                <h2 class="text-xl font-bold text-slate-700">PDAM</h2>
                <div></div>
            </div>

            <div class="modal-body">
                <!-- Search -->
                <div class="relative mb-4">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                    <input type="text" placeholder="Cari nama produk..." class="w-full pl-12 pr-4 py-3 rounded-2xl border border-slate-200 focus:border-cyan-500 focus:ring-2 focus:ring-cyan-200 outline-none">
                </div>

                <!-- Item Utama PDAM -->
                <div class="bg-slate-50 rounded-2xl p-4 flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 bg-cyan-50 rounded-xl flex items-center justify-center text-cyan-600">
                        <i data-lucide="droplet" class="w-5 h-5"></i>
                    </div>
                    <div class="flex-1 font-medium text-slate-700">PDAM</div>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
                </div>

                <!-- TOMBOL TAMBAH AREA -->
                <button id="addAreaBtn" class="w-full bg-cyan-500 text-white py-3 rounded-xl font-semibold hover:bg-cyan-600 flex items-center justify-center gap-2 mb-4">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> Tambah Area
                </button>

                <!-- CONTAINER DAFTAR AREA -->
                <div id="pdamAreaContainer" class="space-y-3">
                    <!-- Area akan muncul di sini -->
                </div>

            </div>

            <div class="modal-footer">
                <button id="savePDAMBtn" class="btn btn-secondary flex-1" disabled onclick="confirmSavePDAM()">Simpan</button>
                <button class="btn btn-danger flex-1" onclick="closePDAM()">Tutup</button>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!--             MODAL MENU TRANSAKSI            -->
    <!-- ============================================ -->
    <div id="transaksiModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="close-btn" onclick="closeTransaksi()"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                <h2 class="text-xl font-bold text-slate-700">Menu Transaksi</h2>
                <div></div>
            </div>

            <div class="modal-body">
                <div id="transaksiList" class="space-y-3">
                    <!-- Item akan muncul di sini -->
                </div>
            </div>

            <div class="modal-footer">
                <button onclick="openPreview()" class="btn bg-slate-100 text-slate-700 flex-1">Preview</button>
                <button id="saveTransaksiBtn" class="btn btn-secondary flex-1" disabled onclick="confirmSaveTransaksi()">Simpan</button>
            </div>
        </div>
    </div>

<script>
    // ============================================
    //               FUNGSI UMUM
    // ============================================
    function toast(msg){ alert(msg); }
    function showConfirm(title, text, callback){
        if(confirm(title + "\n\n" + text)) callback();
    }
    function enableButton(id){ document.getElementById(id).disabled = false; }
    function disableButton(id){ document.getElementById(id).disabled = true; }

    // ============================================
    //               FUNGSI PDAM
    // ============================================
    let pdamAreas = [];

    function openPDAM(){
        document.getElementById("pdamModal").classList.add("show");
        loadPDAMData();
    }

    function closePDAM(){
        document.getElementById("pdamModal").classList.remove("show");
    }

    function loadPDAMData(){
        const saved = localStorage.getItem("pdamAreas");
        if(saved){
            pdamAreas = JSON.parse(saved);
        } else {
            pdamAreas = [{ id: 1, nama: "Area 1" }];
        }
        renderAreaList();
        checkPDAMChange();
    }

    function renderAreaList(){
        const container = document.getElementById("pdamAreaContainer");
        container.innerHTML = "";

        pdamAreas.forEach((area, index) => {
            const div = document.createElement("div");
            div.className = "bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex items-center gap-3";
            div.innerHTML = `
                <div class="w-10 h-10 bg-cyan-50 rounded-xl flex items-center justify-center text-cyan-600">
                    <i data-lucide="map-pin" class="w-5 h-5"></i>
                </div>
                <div class="flex-1">
                    <div class="text-xs text-slate-400">Nama Area</div>
                    <input type="text" value="${area.nama}" 
                           class="w-full bg-transparent border-none outline-none text-slate-700 font-medium"
                           oninput="updateAreaName(${index}, this.value)">
                </div>
                <button onclick="deleteArea(${index})" class="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            `;
            container.appendChild(div);
        });
        lucide.createIcons();
    }

    function updateAreaName(index, newName){
        pdamAreas[index].nama = newName;
        checkPDAMChange();
    }

    function addNewArea(){
        const newArea = { id: Date.now(), nama: `Area ${pdamAreas.length + 1}` };
        pdamAreas.push(newArea);
        renderAreaList();
        checkPDAMChange();
    }

    function deleteArea(index){
        if(pdamAreas.length <= 1){ toast("Minimal harus ada 1 Area"); return; }
        showConfirm("Hapus Area", "Yakin ingin menghapus area ini?", () => {
            pdamAreas.splice(index, 1); renderAreaList(); checkPDAMChange(); toast("Area dihapus");
        });
    }

    function checkPDAMChange(){
        const original = JSON.parse(localStorage.getItem("pdamAreas")) || [];
        JSON.stringify(pdamAreas) !== JSON.stringify(original) ? enableButton("savePDAMBtn") : disableButton("savePDAMBtn");
    }

    function savePDAM(){
        localStorage.setItem("pdamAreas", JSON.stringify(pdamAreas));
        toast("Data Area PDAM Disimpan"); checkPDAMChange();
    }

    function confirmSavePDAM(){
        showConfirm("Konfirmasi Simpan", "Simpan perubahan Area PDAM?", savePDAM);
    }

    document.getElementById("addAreaBtn").addEventListener("click", addNewArea);

    // ============================================
    //            FUNGSI MENU TRANSAKSI
    // ============================================
    let transaksiItems = [];
    let sortableInstance;

    function openTransaksi(){
        document.getElementById("transaksiModal").classList.add("show");
        loadTransaksi();
        renderTransaksiList();
    }

    function closeTransaksi(){
        document.getElementById("transaksiModal").classList.remove("show");
    }

    function loadTransaksi(){
        const data = JSON.parse(localStorage.getItem("transaksiItems"));
        transaksiItems = data && data.length > 0 ? data : [
            {type:"kategori", nama:"PRODUK DIGITAL", open:true},
            {type:"menu", nama:"Pulsa Reguler", icon:"phone"},
            {type:"menu", nama:"Paket Internet", icon:"wifi"}
        ];
    }

    function renderTransaksiList(){
        const list = document.getElementById("transaksiList");
        list.innerHTML = "";
        transaksiItems.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex items-center gap-3";
            
            if(item.type === "kategori"){
                div.innerHTML = `
                    <div class="drag-handle text-slate-400 cursor-grab active:cursor-grabbing"><i data-lucide="menu" class="w-5 h-5"></i></div>
                    <div class="w-8 h-8 bg-cyan-100 rounded-xl flex items-center justify-center text-cyan-600">
                        <i data-lucide="layers" class="w-5 h-5"></i>
                    </div>
                    <div class="flex-1 font-bold text-slate-700">${item.nama}</div>
                    <button onclick="editItemName(${index})" class="p-2 text-slate-400 hover:text-cyan-600 hover:bg-cyan-50 rounded-lg">
                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                    </button>
                `;
            } else {
                div.innerHTML = `
                    <div class="drag-handle text-slate-400 cursor-grab active:cursor-grabbing"><i data-lucide="menu" class="w-5 h-5"></i></div>
                    <div class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-cyan-600 rounded-xl flex items-center justify-center text-white shadow-sm">
                        <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                    </div>
                    <div class="flex-1 font-medium text-slate-700">${item.nama}</div>
                    <button onclick="editItemName(${index})" class="p-2 text-slate-400 hover:text-cyan-600 hover:bg-cyan-50 rounded-lg">
                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                    </button>
                `;
            }
            list.appendChild(div);
        });
        lucide.createIcons();
        initSortable();
    }

    function editItemName(index){
        const newName = prompt("Ubah nama menjadi:", transaksiItems[index].nama);
        if(newName && newName.trim() !== ""){
            transaksiItems[index].nama = newName.trim();
            renderTransaksiList();
            checkTransaksiChange();
        }
    }

    function initSortable(){
        const list = document.getElementById("transaksiList");
        if(sortableInstance) sortableInstance.destroy();
        sortableInstance = new Sortable(list, {
            animation: 150, handle: '.drag-handle',
            onEnd: function(evt){
                const item = transaksiItems.splice(evt.oldIndex, 1)[0];
                transaksiItems.splice(evt.newIndex, 0, item);
                checkTransaksiChange();
            }
        });
    }

    function checkTransaksiChange(){
        const original = JSON.parse(localStorage.getItem("transaksiItems")) || [];
        JSON.stringify(transaksiItems) !== JSON.stringify(original) ? enableButton("saveTransaksiBtn") : disableButton("saveTransaksiBtn");
    }

    function saveTransaksi(){
        localStorage.setItem("transaksiItems", JSON.stringify(transaksiItems));
        toast("Menu Transaksi Disimpan"); checkTransaksiChange();
    }

    function confirmSaveTransaksi(){
        showConfirm("Konfirmasi Simpan", "Simpan perubahan Menu Transaksi?", saveTransaksi);
    }

    function openPreview(){
        let html = "";
        transaksiItems.forEach(item => {
            if(item.type === "kategori"){
                html += `<div class="text-lg font-bold text-slate-800 mt-4 mb-2">${item.nama}</div>`;
            } else {
                html += `
                    <div class="bg-white rounded-xl p-4 shadow mb-2 flex items-center gap-3">
                        <div class="w-10 h-10 bg-cyan-50 rounded-lg flex items-center justify-center text-cyan-600">
                            <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                        </div>
                        <div class="flex-1 font-medium">${item.nama}</div>
                        <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
                    </div>
                `;
            }
        });
        alert("PREVIEW\n\n" + html.replace(/<[^>]*>/g, ''));
    }

    // === INISIALISASI AWAL ===
    window.onload = function(){
        lucide.createIcons();
        loadPDAMData();
        loadTransaksi();
        renderTransaksiList();
    };

</script>
</body>
</html>
