<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin Galeri Pulsa V2</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Lucide Icon -->
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>

<!-- Sortable -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<style>
/* ===============================
   GLOBAL STYLE
================================ */
body{
    background:#f1f5f9;
}

/* ===============================
   MENU AKTIF
================================ */
.menu-active{
    background:linear-gradient(135deg,#0891b2,#2563eb);
    color:white;
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.menu-active .menu-label,
.menu-active i{
    color:white !important;
}

/* ===============================
   CARD MENU
================================ */
.card-menu{
    transition:.25s;
}

.card-menu:hover{
    transform:translateY(-4px);
}

/* ===============================
   MODAL
================================ */
.modal{
    display:none;
}

.modal.show{
    display:flex;
}

/* ===============================
   FLOATING LABEL
================================ */
.floating{
    position:relative;
    margin-top:20px;
}

.floating input,
.floating textarea{
    width:100%;
    border:1px solid #cbd5e1;
    border-radius:12px;
    padding:14px;
    outline:none;
    background:white;
    resize:none;
    overflow:hidden;
}

/* Khusus Alamat Konter awalnya tinggi 5 baris */
#alamatKonter {
    min-height: 120px; /* Ini setara sekitar 5 baris */
}

.floating label{
    position:absolute;
    left:12px;
    top:14px;
    background:white;
    padding:0 6px;
    color:#94a3b8;
    transition:.2s;
    pointer-events:none;
}

.floating input:focus + label,
.floating input:not(:placeholder-shown) + label,
.floating textarea:focus + label,
.floating textarea:not(:placeholder-shown) + label{
    top:-10px;
    font-size:12px;
    color:#0891b2;
}

/* ===============================
   TOAST
================================ */
.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#16a34a;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    display:none;
    z-index:9999;
}

/* ===============================
   DRAG HANDLE
================================ */
.drag-handle{
    cursor:grab;
    touch-action:none;
}

.drag-handle:active{
    cursor:grabbing;
}

/* ===============================
   SORTABLE EFFECT
================================ */
#transaksiList > div{
    margin-bottom:10px;
}

#transaksiList .sortable-ghost{
    opacity:.4;
}

#transaksiList .sortable-chosen{
    transform:scale(1.02);
}
</style>
</head>

<body class="max-w-screen-md mx-auto p-4">

<!-- HEADER UTAMA -->
<div class="bg-gradient-to-r from-cyan-600 to-blue-600 rounded-3xl p-6 text-white shadow-lg">
    <div class="flex items-center gap-4">
        <!-- ICON HEADER: BACKGROUND PUTIH POLOS, ICON WARNA CYAN -->
        <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center">
            <i data-lucide="shield" class="text-cyan-600"></i>
        </div>
        <div>
            <h1 class="text-2xl font-bold">Admin Galeri Pulsa</h1>
            <p class="text-sm opacity-90">agusbaba1987@gmail.com</p>
        </div>
    </div>

    <!-- TOMBOL PREVIEW -->
    <div class="mt-4 flex justify-end">
        <button onclick="openPreview()" class="bg-white text-cyan-600 px-4 py-2 rounded-xl font-bold shadow hover:bg-gray-100 transition">
            <i data-lucide="eye" class="w-4 h-4 inline mr-1"></i> Lihat Tampilan User
        </button>
    </div>
</div>

<!-- MENU UTAMA -->
<div id="menuGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-4 mt-6"></div>

<!-- SETUP SERVER -->
<div id="serverModal" class="modal fixed inset-0 bg-white z-50 items-center justify-center p-4">
    <div class="bg-white w-full max-w-4xl rounded-3xl shadow-xl overflow-hidden">
        <!-- HEADER MODAL SAMA DENGAN HEADER UTAMA -->
        <div class="bg-gradient-to-r from-cyan-600 to-blue-600 p-6 text-white">
            <h2 class="text-xl font-bold">Setup Server</h2>
        </div>

        <div class="p-6">
            <div class="floating">
                <input id="namaKonter" placeholder=" ">
                <label>Nama Konter</label>
            </div>

            <div class="floating">
                <textarea id="alamatKonter" placeholder=" "></textarea>
                <label>Alamat Konter</label>
            </div>

            <div class="mt-5 flex gap-2">
                <button id="saveServerBtn" onclick="confirmSaveServer()" disabled class="flex-1 bg-gray-400 cursor-not-allowed text-white py-4 rounded-xl">Simpan</button>
                <button onclick="checkCloseServer()" class="flex-1 bg-red-500 text-white py-4 rounded-xl">Tutup</button>
            </div>
        </div>
    </div>
</div>

<!-- SETUP CENTER -->
<div id="centerModal" class="modal fixed inset-0 bg-white z-50 overflow-auto">
    <div class="w-full px-2">
        <!-- HEADER MODAL SAMA DENGAN HEADER UTAMA -->
        <div class="sticky top-0 bg-gradient-to-r from-cyan-600 to-blue-600 text-white p-3 z-50 flex items-center justify-between">
            <h2 class="font-bold text-xl">Setup Center</h2>
        </div>

        <div class="grid md:grid-cols-2 gap-4 mt-4">
            <div class="bg-white p-5 rounded-2xl shadow">
                <h3 class="font-bold text-cyan-600 text-lg mb-2">IP Center</h3>
                <div class="floating"><input id="ipNama" placeholder=" "><label>Nama Center</label></div>
                <div class="floating"><input id="ipServer" placeholder=" "><label>Server Center</label></div>
                <div class="floating"><input id="ipHost" placeholder=" "><label>Host</label></div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow">
                <h3 class="font-bold text-cyan-600 text-lg mb-2">Jabber Center</h3>
                <div class="floating"><input id="jabberNama" placeholder=" "><label>Nama Center</label></div>
                <div class="floating"><input id="jabberServer" placeholder=" "><label>Server Center</label></div>
                <div class="floating"><input id="jabberHost" placeholder=" "><label>Host</label></div>
            </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow mt-4">
            <h3 class="font-bold text-cyan-600 text-lg mb-2">Nomor Center</h3>
            <div class="floating"><input id="waCenter" placeholder=" "><label>WhatsApp Center</label></div>
            <div class="floating"><input id="smsCenter" placeholder=" "><label>SMS Center</label></div>
        </div>

        <div class="sticky bottom-0 left-0 bg-white border-t p-3 mt-5 flex gap-3 z-50">
            <button id="saveCenterBtn" onclick="confirmSaveCenter()" disabled class="flex-1 bg-gray-400 cursor-not-allowed text-white py-4 rounded-xl">Simpan</button>
            <button onclick="checkCloseCenter()" class="flex-1 bg-red-500 text-white py-4 rounded-2xl font-bold shadow-lg">Tutup</button>
        </div>
    </div>
</div>

<!-- MODAL KONFIRMASI -->
<div id="confirmModal" class="hidden fixed inset-0 bg-black/50 z-[9999] flex items-center justify-center p-5">
    <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl">
        <h3 id="confirmTitle" class="text-xl font-bold text-gray-800 mb-2"></h3>
        <p id="confirmMessage" class="text-gray-600 mb-6"></p>
        <div class="flex gap-3">
            <button onclick="closeConfirm()" class="flex-1 bg-gray-200 py-3 rounded-xl">Batal</button>
            <button onclick="executeConfirm()" class="flex-1 bg-green-600 text-white py-3 rounded-xl">OK</button>
        </div>
    </div>
</div>

<!-- MENU TRANSAKSI -->
<div id="transaksiModal" class="modal fixed inset-0 bg-white z-50 overflow-auto">
    <div class="w-full">
        <!-- HEADER MODAL SAMA DENGAN HEADER UTAMA -->
        <div class="sticky top-0 bg-gradient-to-r from-cyan-600 to-blue-600 text-white p-3 z-50">
            <div class="flex items-center justify-between">
                <h2 class="font-bold text-xl">Menu Transaksi</h2>
            </div>
            <div class="flex gap-3 mt-4">
                <button onclick="addMenu()" class="flex-1 bg-cyan-700 hover:bg-cyan-800 text-white py-3 rounded-2xl font-bold">+ Menu</button>
                <!-- TOMBOL KATEGORI WARNA SAMA DENGAN BG ICON -->
                <button onclick="addKategori()" class="flex-1 bg-orange-200 hover:bg-orange-300 text-slate-700 py-3 rounded-2xl font-bold">+ Kategori</button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow p-3 mb-3">
            <div id="transaksiInfo" class="text-sm text-slate-600">0 Menu • 0 Kategori</div>
        </div>

        <div id="transaksiList" class="p-3 space-y-2 pb-28"></div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex gap-3 z-50 max-w-screen-md mx-auto">
            <button id="saveTransaksiBtn" onclick="confirmSaveTransaksi()" disabled class="flex-1 bg-gray-400 cursor-not-allowed text-white py-4 rounded-xl">Simpan</button>
            <button onclick="closeTransaksi()" class="flex-1 bg-red-500 text-white py-4 rounded-xl">Tutup</button>
        </div>
    </div>
</div>

<!-- ===================================================== -->
<!-- MODAL PREVIEW TAMPILAN USER -->
<!-- ===================================================== -->
<div id="previewModal" class="modal fixed inset-0 bg-white z-50 overflow-auto">
    <div class="w-full">
        <!-- HEADER MODAL SAMA DENGAN HEADER UTAMA -->
        <div class="sticky top-0 bg-gradient-to-r from-cyan-600 to-blue-600 text-white p-4 z-50">
            <div class="flex items-center justify-between">
                <h2 class="font-bold text-xl">Tampilan User</h2>
                <button onclick="closePreview()" class="bg-white text-cyan-600 px-4 py-2 rounded-xl font-bold">
                    Tutup
                </button>
            </div>
        </div>

        <div id="previewContent" class="p-4 pb-24">
            <!-- Konten preview akan diisi lewat JS -->
        </div>
    </div>
</div>
<!-- ===================================================== -->
<!-- END MODAL PREVIEW -->
<!-- ===================================================== -->

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>
window.onerror = function(message, source, line, column){
    console.error("ERROR:", message, "Baris:", line);
};

let centerChanged = false;
let serverChanged = false;
let transaksiChanged = false;
let confirmAction = null;
let sortableInstance = null;

/* ============================================= */
// FUNGSI AUTO GROW / OTOMATIS MELEBAR KOTAK
/* ============================================= */
function autoGrow(element) {
    element.style.height = "auto";
    element.style.height = (element.scrollHeight) + "px";
}

/* MENU UTAMA */
const menus = [
    {label:"Setup Server", icon:"server", action:"server"},
    {label:"Setup Center", icon:"database", action:"center"},
    {label:"Menu Transaksi", icon:"layout-grid", action:"transaksi"},
    {label:"Prabayar", icon:"smartphone"},
    {label:"Pascabayar", icon:"credit-card"},
    {label:"Format Request", icon:"file-text"},
    {label:"Logo", icon:"image"},
    {label:"OTP", icon:"key-round"},
    {label:"Poin", icon:"star"},
    {label:"Downline", icon:"users"}
];

function renderMenus(){
    const grid = document.getElementById("menuGrid");
    if(!grid) return;
    grid.innerHTML = "";
    menus.forEach((menu,index)=>{
        const card = document.createElement("div");
        card.className = "card-menu bg-white rounded-2xl shadow p-4 text-center cursor-pointer";
        card.dataset.index = index;
        card.innerHTML = `
            <div class="flex justify-center mb-3">
                <!-- MENU UTAMA: ICON WARNA HITAM/GELAP, BACKGROUND TRANSPARAN -->
                <div class="w-12 h-12 rounded-xl bg-transparent flex items-center justify-center">
                    <i data-lucide="${menu.icon}" class="text-slate-800"></i>
                </div>
            </div>
            <div class="menu-label font-semibold text-gray-700">${menu.label}</div>
        `;
        card.onclick = ()=>{
            document.querySelectorAll(".card-menu").forEach(el=>el.classList.remove("menu-active"));
            card.classList.add("menu-active");
            if(menu.action==="server") openServer();
            if(menu.action==="center") openCenter();
            if(menu.action==="transaksi") openTransaksi();
        };
        grid.appendChild(card);
    });
    lucide.createIcons();
}

/* TOAST */
function toast(msg){
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.style.display = "block";
    setTimeout(()=>t.style.display = "none", 2500);
}

/* BUTTON STATE */
function enableButton(btnId){
    const btn = document.getElementById(btnId);
    btn.disabled = false;
    btn.classList.remove("bg-gray-400", "cursor-not-allowed");
    btn.classList.add("bg-green-600");
}
function disableButton(btnId){
    const btn = document.getElementById(btnId);
    btn.disabled = true;
    btn.classList.remove("bg-green-600");
    btn.classList.add("bg-gray-400", "cursor-not-allowed");
}

/* CONFIRM MODAL */
function showConfirm(title,message,action){
    document.getElementById("confirmTitle").innerText = title;
    document.getElementById("confirmMessage").innerText = message;
    confirmAction = action;
    document.getElementById("confirmModal").classList.remove("hidden");
}
function closeConfirm(){
    document.getElementById("confirmModal").classList.add("hidden");
}
function executeConfirm(){
    if(typeof confirmAction === "function") confirmAction();
    closeConfirm();
}

/* SETUP SERVER */
function openServer(){
    document.getElementById("serverModal").classList.add("show");
    loadServer();
    serverChanged = false;
    disableButton("saveServerBtn");
    
    // Jalankan auto grow saat modal dibuka
    setTimeout(() => {
        autoGrow(alamatKonter);
    }, 100);
}
function closeServer(){
    document.getElementById("serverModal").classList.remove("show");
}
function saveServer(){
    localStorage.setItem("setupServer", JSON.stringify({
        nama:namaKonter.value,
        alamat:alamatKonter.value
    }));
    serverChanged = false;
    disableButton("saveServerBtn");
    toast("Data Server Disimpan");
}
function confirmSaveServer(){
    if(!serverChanged) return;
    showConfirm("Konfirmasi Simpan", "Apakah Anda yakin ingin menyimpan perubahan Server?", saveServer);
}
function checkCloseServer(){
    if(serverChanged){
        showConfirm("Perubahan Belum Disimpan", "Yakin ingin keluar?", closeServer);
        return;
    }
    closeServer();
}
function loadServer(){
    const data = JSON.parse(localStorage.getItem("setupServer"));
    if(!data) return;
    namaKonter.value = data.nama || "";
    alamatKonter.value = data.alamat || "";
}

/* SETUP CENTER */
function openCenter(){
    document.getElementById("centerModal").classList.add("show");
    loadCenter();
    centerChanged = false;
    disableButton("saveCenterBtn");
}
function closeCenter(){
    document.getElementById("centerModal").classList.remove("show");
}
function saveCenter(){
    localStorage.setItem("centerServer", JSON.stringify({
        ip:{nama:ipNama.value, server:ipServer.value, host:ipHost.value},
        jabber:{nama:jabberNama.value, server:jabberServer.value, host:jabberHost.value},
        nomor:{wa:waCenter.value, sms:smsCenter.value}
    }));
    centerChanged = false;
    disableButton("saveCenterBtn");
    toast("Data Center Disimpan");
}
function confirmSaveCenter(){
    if(!centerChanged) return;
    showConfirm("Konfirmasi Simpan", "Apakah Anda yakin ingin menyimpan perubahan Center?", saveCenter);
}
function checkCloseCenter(){
    if(centerChanged){
        showConfirm("Perubahan Belum Disimpan", "Yakin ingin keluar?", closeCenter);
        return;
    }
    closeCenter();
}
function loadCenter(){
    const data = JSON.parse(localStorage.getItem("centerServer"));
    if(!data) return;
    ipNama.value = data.ip?.nama || "";
    ipServer.value = data.ip?.server || "";
    ipHost.value = data.ip?.host || "";
    jabberNama.value = data.jabber?.nama || "";
    jabberServer.value = data.jabber?.server || "";
    jabberHost.value = data.jabber?.host || "";
    waCenter.value = data.nomor?.wa || "";
    smsCenter.value = data.nomor?.sms || "";
}

/* WATCH INPUT */
function watchServerChanges(){
    [namaKonter, alamatKonter].forEach(field=>{
        field.addEventListener("input", ()=>{
            serverChanged = true;
            enableButton("saveServerBtn");
            autoGrow(field);
        });
    });
}
function watchCenterChanges(){
    [
        document.getElementById("ipNama"),
        document.getElementById("ipServer"),
        document.getElementById("ipHost"),
        document.getElementById("jabberNama"),
        document.getElementById("jabberServer"),
        document.getElementById("jabberHost"),
        document.getElementById("waCenter"),
        document.getElementById("smsCenter")
    ].forEach(field=>{
        if(!field) return;
        field.addEventListener("input", ()=>{
            centerChanged = true;
            enableButton("saveCenterBtn");
        });
    });
}

/* MENU TRANSAKSI DATA */
let transaksiItems = JSON.parse(localStorage.getItem("transaksiItems")) || [
    {type:"kategori", nama:"PRODUK DIGITAL", checked:false, swiped:false},
    {type:"menu", nama:"Pulsa Reguler", icon:"smartphone", iconFile:"", checked:false, swiped:false},
    {type:"menu", nama:"Paket Data", icon:"wifi", iconFile:"", checked:false, swiped:false}
];

function openTransaksi(){
    document.getElementById("transaksiModal").classList.add("show");
    loadTransaksi();
    transaksiChanged = false;
    disableButton("saveTransaksiBtn");
}
function closeTransaksi(){
    if(transaksiChanged){
        showConfirm("Perubahan Belum Disimpan", "Yakin ingin keluar tanpa menyimpan perubahan?", ()=>{
            transaksiChanged = false;
            document.getElementById("transaksiModal").classList.remove("show");
        });
        return;
    }
    document.getElementById("transaksiModal").classList.remove("show");
}
function updateTransaksiInfo(){
    const totalMenu = transaksiItems.filter(item => item.type === "menu").length;
    const totalKategori = transaksiItems.filter(item => item.type === "kategori").length;
    document.getElementById("transaksiInfo").innerText = `${totalMenu} Menu • ${totalKategori} Kategori`;
}
function addMenu(){
    transaksiItems.unshift({
        type: "menu",
        nama: "Menu Baru",
        icon: "circle",
        iconFile: "",
        checked: false,
        swiped: false
    });
    transaksiChanged = true;
    enableButton("saveTransaksiBtn");
    renderTransaksi();
    fokusInputPertama();
}
function addKategori(){
    transaksiItems.unshift({
        type: "kategori",
        nama: "Kategori Baru",
        checked: false,
        swiped: false
    });
    transaksiChanged = true;
    enableButton("saveTransaksiBtn");
    renderTransaksi();
    fokusInputPertama();
}
function fokusInputPertama(){
    setTimeout(()=>{
        const inputs = document.querySelectorAll("#transaksiList input[type='text']");
        if(inputs.length){
            inputs[0].focus();
            inputs[0].select();
        }
    },100);
}
function updateTransaksi(index,value){
    transaksiItems[index].nama = value;
    transaksiChanged = true;
    enableButton("saveTransaksiBtn");
}
function toggleTransaksi(index){
    transaksiItems[index].checked = !transaksiItems[index].checked;
    transaksiChanged = true;
    enableButton("saveTransaksiBtn");
    renderTransaksi();
}
function swipeLeft(index){
    transaksiItems.forEach(function(item,i){
        item.swiped = (i === index);
    });
    renderTransaksi();
}
function swipeRight(index){
    transaksiItems[index].swiped = false;
    renderTransaksi();
}
function renderTransaksi(){
    const list = document.getElementById("transaksiList");
    list.innerHTML = "";
    transaksiItems.forEach((item,index)=>{
        const div = document.createElement("div");
        if(item.type === "kategori"){
            div.innerHTML = `
            <div class="bg-gradient-to-r from-amber-400 to-orange-500 text-white rounded-2xl p-3 shadow-lg">
                <div class="flex items-center gap-3 h-10">
                    <input type="checkbox" ${item.checked ? "checked" : ""} onchange="toggleTransaksi(${index})" class="w-5 h-5">
                    <i data-lucide="folder-open"></i>
                    <input type="text" value="${item.nama}" class="flex-1 bg-transparent outline-none font-bold text-lg" oninput="updateTransaksi(${index},this.value)">
                    <div class="ml-auto flex items-center gap-2">
                        ${item.swiped ? `<button onclick="hapusTransaksi(${index})" class="bg-red-500 text-white w-10 h-10 rounded-xl flex items-center justify-center"><i data-lucide="trash-2"></i></button>` : ""}
                        <i data-lucide="grip-vertical" class="drag-handle cursor-move"></i>
                    </div>
                </div>
            </div>`;
        }else{
            div.innerHTML = `
            <div class="bg-white rounded-2xl p-3 shadow-lg border border-slate-200">
                <div class="flex items-center gap-3 h-10">
                    <input type="checkbox" ${item.checked ? "checked" : ""} onchange="toggleTransaksi(${index})" class="w-5 h-5">
                    <!-- DI SINI JADI TRANSPARAN + BORDER -->
                    <div onclick="gantiIcon(${index})" class="w-12 h-12 rounded-xl border border-slate-300 bg-transparent flex items-center justify-center overflow-hidden cursor-pointer">
                        ${item.iconFile ? `<img src="${item.iconFile}" class="w-full h-full object-cover">` : `<i data-lucide="${item.icon}" class="text-cyan-600"></i>`}
                    </div>
                    <div class="flex-1">
                        <input type="text" value="${item.nama}" class="w-full outline-none bg-transparent font-semibold" oninput="updateTransaksi(${index},this.value)">
                    </div>
                    <div class="ml-auto flex items-center gap-2">
                        ${item.swiped ? `<button onclick="hapusTransaksi(${index})" class="bg-red-500 text-white w-10 h-10 rounded-xl flex items-center justify-center"><i data-lucide="trash-2"></i></button>` : ""}
                        <i data-lucide="grip-vertical" class="drag-handle cursor-move text-slate-400"></i>
                    </div>
                </div>
            </div>`;
        }
        let startX = 0;
        div.addEventListener("touchstart",(e)=> startX = e.touches[0].clientX );
        div.addEventListener("touchend",(e)=>{
            const endX = e.changedTouches[0].clientX;
            const diff = startX - endX;
            if(diff > 80) swipeLeft(index);
            if(diff < -80) swipeRight(index);
        });
        list.appendChild(div);
    });
    updateTransaksiInfo();
    lucide.createIcons();
    initDragDrop();
}
function hapusTransaksi(index){
    const namaItem = transaksiItems[index].nama;
    showConfirm("Konfirmasi Hapus", `Yakin ingin menghapus "${namaItem}" ?`, ()=>{
        transaksiItems.splice(index,1);
        transaksiChanged = true;
        enableButton("saveTransaksiBtn");
        renderTransaksi();
    });
}
function initDragDrop(){
    const list = document.getElementById("transaksiList");
    if(!list) return;
    if(sortableInstance) sortableInstance.destroy();
    sortableInstance = Sortable.create(list,{
        animation:150,
        handle:".drag-handle",
        delay:500,
        delayOnTouchOnly:true,
        onEnd:function(evt){
            const moved = transaksiItems.splice(evt.oldIndex,1)[0];
            transaksiItems.splice(evt.newIndex,0,moved);
            transaksiChanged = true;
            enableButton("saveTransaksiBtn");
            renderTransaksi();
        }
    });
}
function saveTransaksi(){
    localStorage.setItem("transaksiItems", JSON.stringify(transaksiItems));
    transaksiChanged = false;
    disableButton("saveTransaksiBtn");
    toast("Menu Transaksi berhasil disimpan");
    loadTransaksi();
}
function loadTransaksi(){
    const data = localStorage.getItem("transaksiItems");
    if(data) transaksiItems = JSON.parse(data);
    transaksiItems.forEach(item=>{
        if(item.checked === undefined) item.checked = false;
        if(item.swiped === undefined) item.swiped = false;
        if(item.icon === undefined) item.icon = "circle";
        if(item.iconFile === undefined) item.iconFile = "";
    });
    renderTransaksi();
    updateTransaksiInfo();
}
function gantiIcon(index){
    const picker = document.createElement("input");
    picker.type = "file";
    picker.accept = "image/*";
    picker.onchange = function(e){
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(evt){
            transaksiItems[index].iconFile = evt.target.result;
            transaksiChanged = true;
            enableButton("saveTransaksiBtn");
            renderTransaksi();
        };
        reader.readAsDataURL(file);
    };
    picker.click();
}
function confirmSaveTransaksi(){
    if(!transaksiChanged) return;
    showConfirm("Konfirmasi Simpan", "Apakah Anda yakin ingin menyimpan Menu Transaksi?", saveTransaksi);
}

/* ===================================================== */
/* FUNGSI PREVIEW TAMPILAN USER */
/* ===================================================== */
function openPreview(){
    const modal = document.getElementById("previewModal");
    const content = document.getElementById("previewContent");
    
    let html = "";

    // Ambil data server
    const serverData = JSON.parse(localStorage.getItem("setupServer")) || { nama:"Nama Konter", alamat:"Alamat Konter" };

    // Header Preview
    html += `
    <div class="bg-gradient-to-r from-cyan-600 to-blue-600 rounded-3xl p-6 text-white shadow-lg mb-6">
        <div class="text-center">
            <h2 class="text-2xl font-bold">${serverData.nama}</h2>
            <p class="text-sm opacity-90 mt-1">${serverData.alamat}</p>
        </div>
    </div>
    `;

    // Render Menu yang dicentang saja
    transaksiItems.forEach(item=>{
        if(item.type === "kategori"){
            html += `
            <div class="bg-gradient-to-r from-amber-400 to-orange-500 text-white rounded-2xl p-3 shadow-lg mb-4">
                <h3 class="font-bold text-lg">${item.nama}</h3>
            </div>
            `;
        } else {
            if(item.checked){
                html += `
                <div class="bg-white rounded-2xl p-3 shadow-lg mb-3 flex items-center gap-4 border border-slate-200">
                    <!-- DI PREVIEW JUGA TRANSPARAN + BORDER -->
                    <div class="w-12 h-12 rounded-xl border border-slate-300 bg-transparent flex items-center justify-center overflow-hidden">
                        ${item.iconFile ? `<img src="${item.iconFile}" class="w-full h-full object-cover">` : `<i data-lucide="${item.icon}" class="text-cyan-600"></i>`}
                    </div>
                    <span class="font-semibold text-gray-700">${item.nama}</span>
                </div>
                `;
            }
        }
    });

    content.innerHTML = html;
    modal.classList.add("show");
    lucide.createIcons();
}

function closePreview(){
    document.getElementById("previewModal").classList.remove("show");
}

window.onload = function(){
    renderMenus();
    watchServerChanges();
    watchCenterChanges();
};
</script>
