<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Konter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .blink { animation: blink 0.5s ease-in-out; }
        .modal { transition: all 0.3s ease-out; opacity: 0; visibility: hidden; transform: translateY(20px); }
        .modal.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .modal-backdrop { background: rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-800">

    <!-- HEADER -->
    <header class="bg-gradient-to-r from-cyan-600 to-blue-600 text-white p-6 shadow-lg">
        <h1 class="text-2xl font-bold text-center">NAMA KONTER</h1>
        <p class="text-center text-sm opacity-90 mt-1">Alamat Konter Kamu</p>
    </header>

    <!-- MENU UTAMA -->
    <main class="p-6 grid grid-cols-2 gap-4">
        <button onclick="openServer()" class="bg-white p-6 rounded-2xl shadow-md flex flex-col items-center gap-3 hover:shadow-lg transition">
            <i data-lucide="settings" class="w-8 h-8 text-cyan-600"></i>
            <span class="font-semibold">Setting Server</span>
        </button>
        <button onclick="openCenter()" class="bg-white p-6 rounded-2xl shadow-md flex flex-col items-center gap-3 hover:shadow-lg transition">
            <i data-lucide="server" class="w-8 h-8 text-cyan-600"></i>
            <span class="font-semibold">Setting Center</span>
        </button>
        <button onclick="openTransaksi()" class="bg-white p-6 rounded-2xl shadow-md flex flex-col items-center gap-3 hover:shadow-lg transition">
            <i data-lucide="layout-grid" class="w-8 h-8 text-cyan-600"></i>
            <span class="font-semibold">Menu Transaksi</span>
        </button>
        <button onclick="openPreview()" class="bg-white p-6 rounded-2xl shadow-md flex flex-col items-center gap-3 hover:shadow-lg transition">
            <i data-lucide="eye" class="w-8 h-8 text-cyan-600"></i>
            <span class="font-semibold">Preview</span>
        </button>
    </main>

    <!-- MODAL SETTING SERVER -->
    <div id="serverModal" class="modal fixed inset-0 z-50 flex items-end justify-center">
        <div class="modal-backdrop absolute inset-0" onclick="closeServer()"></div>
        <div class="bg-white rounded-t-3xl p-6 w-full max-w-lg relative z-10">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Setting Server</h2>
                <button onclick="closeServer()" class="text-slate-500"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-sm text-slate-500">Nama Konter</label>
                    <input id="namaKonter" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-cyan-500">
                </div>
                <div>
                    <label class="text-sm text-slate-500">Alamat</label>
                    <textarea id="alamatKonter" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-cyan-500" rows="2"></textarea>
                </div>
            </div>
            <div class="mt-8 flex gap-3">
                <button onclick="confirmSaveServer()" id="saveServerBtn" class="flex-1 bg-cyan-600 text-white p-3 rounded-xl font-semibold opacity-50 cursor-not-allowed" disabled>Simpan</button>
            </div>
        </div>
    </div>

    <!-- MODAL SETTING CENTER -->
    <div id="centerModal" class="modal fixed inset-0 z-50 flex items-end justify-center">
        <div class="modal-backdrop absolute inset-0" onclick="closeCenter()"></div>
        <div class="bg-white rounded-t-3xl p-6 w-full max-w-lg relative z-10">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Setting Center</h2>
                <button onclick="closeCenter()" class="text-slate-500"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="space-y-6">
                <div class="bg-slate-50 p-4 rounded-2xl">
                    <h3 class="font-semibold mb-3 text-cyan-700">IP Server</h3>
                    <div class="grid grid-cols-3 gap-3">
                        <input id="ipNama" placeholder="Nama" class="p-3 rounded-xl border border-slate-200 outline-none">
                        <input id="ipServer" placeholder="Server" class="p-3 rounded-xl border border-slate-200 outline-none">
                        <input id="ipHost" placeholder="Port" class="p-3 rounded-xl border border-slate-200 outline-none">
                    </div>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl">
                    <h3 class="font-semibold mb-3 text-cyan-700">Jabber</h3>
                    <div class="grid grid-cols-3 gap-3">
                        <input id="jabberNama" placeholder="Nama" class="p-3 rounded-xl border border-slate-200 outline-none">
                        <input id="jabberServer" placeholder="Server" class="p-3 rounded-xl border border-slate-200 outline-none">
                        <input id="jabberHost" placeholder="Port" class="p-3 rounded-xl border border-slate-200 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input id="waCenter" placeholder="Nomor WhatsApp" class="p-3 rounded-xl border border-slate-200 outline-none">
                    <input id="smsCenter" placeholder="Nomor SMS" class="p-3 rounded-xl border border-slate-200 outline-none">
                </div>
            </div>
            <div class="mt-8 flex gap-3">
                <button onclick="confirmSaveCenter()" id="saveCenterBtn" class="flex-1 bg-cyan-600 text-white p-3 rounded-xl font-semibold opacity-50 cursor-not-allowed" disabled>Simpan</button>
            </div>
        </div>
    </div>

    <!-- MODAL MENU TRANSAKSI -->
    <div id="transaksiModal" class="modal fixed inset-0 z-50 flex items-end justify-center">
        <div class="modal-backdrop absolute inset-0" onclick="closeTransaksi()"></div>
        <div class="bg-white rounded-t-3xl p-6 w-full max-w-lg relative z-10 h-[85vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Menu Transaksi</h2>
                <button onclick="closeTransaksi()" class="text-slate-500"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <p id="transaksiInfo" class="text-sm text-slate-500 mb-4">0 Menu • 0 Kategori</p>
            
            <div class="flex gap-2 mb-4">
                <button id="btnMenu" onclick="addMenu()" class="flex-1 bg-cyan-50 text-cyan-700 p-3 rounded-xl font-semibold border border-cyan-100">+ Menu</button>
                <button id="btnKategori" onclick="addKategori()" class="flex-1 bg-amber-50 text-amber-700 p-3 rounded-xl font-semibold border border-amber-100">+ Kategori</button>
            </div>

            <div id="transaksiList" class="space-y-3 overflow-y-auto flex-1 pr-2">
                <!-- Item akan muncul di sini -->
            </div>

            <div class="mt-6 pt-4 border-t">
                <button onclick="confirmSaveTransaksi()" id="saveTransaksiBtn" class="w-full bg-cyan-600 text-white p-3 rounded-xl font-semibold opacity-50 cursor-not-allowed" disabled>Simpan Perubahan</button>
            </div>
        </div>
    </div>

    <!-- MODAL PREVIEW -->
    <div id="previewModal" class="modal fixed inset-0 z-50 flex items-end justify-center">
        <div class="modal-backdrop absolute inset-0" onclick="closePreview()"></div>
        <div class="bg-white rounded-t-3xl p-6 w-full max-w-lg relative z-10 h-[85vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Preview Tampilan</h2>
                <button onclick="closePreview()" class="text-slate-500"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div id="previewContent">
                <!-- Konten preview -->
            </div>
        </div>
    </div>

    <!-- MODAL CONFIRM -->
    <div id="confirmModal" class="modal fixed inset-0 z-[60] flex items-center justify-center">
        <div class="modal-backdrop absolute inset-0" onclick="closeConfirm()"></div>
        <div class="bg-white rounded-2xl p-6 w-[85%] max-w-md relative z-10">
            <h3 id="confirmTitle" class="text-lg font-bold mb-2"></h3>
            <p id="confirmText" class="text-slate-500 mb-6"></p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 bg-slate-100 p-3 rounded-xl font-semibold">Batal</button>
                <button id="confirmYes" class="flex-1 bg-red-500 text-white p-3 rounded-xl font-semibold"></button>
            </div>
        </div>
    </div>

<script>
// --- VARIABEL GLOBAL ---
let sortableInstance;
let originalServerData = {};
let originalCenterData = {};

// --- ELEMENTS ---
const namaKonter = document.getElementById("namaKonter");
const alamatKonter = document.getElementById("alamatKonter");

const ipNama = document.getElementById("ipNama");
const ipServer = document.getElementById("ipServer");
const ipHost = document.getElementById("ipHost");
const jabberNama = document.getElementById("jabberNama");
const jabberServer = document.getElementById("jabberServer");
const jabberHost = document.getElementById("jabberHost");
const waCenter = document.getElementById("waCenter");
const smsCenter = document.getElementById("smsCenter");

// --- UTILITY ---
function escapeHtml(text) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.replace(/[&<>"]/g, m => map[m]);
}

function autoGrow(field) {
    field.style.height = 'inherit';
    field.style.height = (field.scrollHeight) + 'px';
}

function showConfirm(title, text, confirmCallback, btnText = "Ya") {
    document.getElementById("confirmTitle").innerText = title;
    document.getElementById("confirmText").innerText = text;
    document.getElementById("confirmYes").innerText = btnText;
    document.getElementById("confirmModal").classList.add("show");

    document.getElementById("confirmYes").onclick = function(){
        closeConfirm();
        if(confirmCallback) confirmCallback();
    };
}
function closeConfirm(){
    document.getElementById("confirmModal").classList.remove("show");
}

function toast(msg){
    const t = document.createElement("div");
    t.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-xl z-50 opacity-0 transition-all duration-300";
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(()=>{ t.style.opacity = 1; t.style.bottom = "28%"; },10);
    setTimeout(()=>{ t.style.opacity = 0; },2500);
    setTimeout(()=>{ t.remove(); },3000);
}

function disableButton(id){
    document.getElementById(id).disabled = true;
    document.getElementById(id).classList.add("opacity-50", "cursor-not-allowed");
}
function enableButton(id){
    document.getElementById(id).disabled = false;
    document.getElementById(id).classList.remove("opacity-50", "cursor-not-allowed");
}

// --- SERVER SETUP ---
function getCurrentServerData(){
    return {
        nama: namaKonter.value.trim(),
        alamat: alamatKonter.value.trim()
    };
}

function checkServerChange(){
    if(JSON.stringify(getCurrentServerData()) !== JSON.stringify(originalServerData)){
        enableButton("saveServerBtn");
    } else {
        disableButton("saveServerBtn");
    }
}

function openServer(){
    document.getElementById("serverModal").classList.add("show");
    loadServer();
    checkServerChange();
}
function closeServer(){
    if(!document.getElementById("saveServerBtn").disabled){
        showConfirm("Perubahan Belum Disimpan", "Yakin ingin keluar tanpa simpan?", ()=>{
            document.getElementById("serverModal").classList.remove("show");
        }, "Ya, Keluar");
        return;
    }
    document.getElementById("serverModal").classList.remove("show");
}

function saveServer(){
    const data = getCurrentServerData();
    localStorage.setItem("setupServer", JSON.stringify(data));
    originalServerData = JSON.parse(JSON.stringify(data));
    toast("Data Server Disimpan");
    checkServerChange();
}
function loadServer(){
    const data = JSON.parse(localStorage.getItem("setupServer"));
    if(data){
        namaKonter.value = data.nama || "";
        alamatKonter.value = data.alamat || "";
        originalServerData = JSON.parse(JSON.stringify(data));
    } else {
        namaKonter.value = "";
        alamatKonter.value = "";
        originalServerData = {};
    }
    autoGrow(namaKonter);
    autoGrow(alamatKonter);
}

function confirmSaveServer(){
    showConfirm("Konfirmasi Simpan", "Simpan perubahan Server?", saveServer);
}

// --- CENTER SETUP ---
function getCurrentCenterData(){
    return {
        ip: { nama: ipNama.value.trim(), server: ipServer.value.trim(), host: ipHost.value.trim() },
        jabber: { nama: jabberNama.value.trim(), server: jabberServer.value.trim(), host: jabberHost.value.trim() },
        nomor: { wa: waCenter.value.trim(), sms: smsCenter.value.trim() }
    };
}

function checkCenterChange(){
    if(JSON.stringify(getCurrentCenterData()) !== JSON.stringify(originalCenterData)){
        enableButton("saveCenterBtn");
    } else {
        disableButton("saveCenterBtn");
    }
}

function openCenter(){
    document.getElementById("centerModal").classList.add("show");
    loadCenter();
    checkCenterChange();
}
function closeCenter(){
    if(!document.getElementById("saveCenterBtn").disabled){
        showConfirm("Perubahan Belum Disimpan", "Yakin ingin keluar tanpa simpan?", ()=>{
            document.getElementById("centerModal").classList.remove("show");
        }, "Ya, Keluar");
        return;
    }
    document.getElementById("centerModal").classList.remove("show");
}

function saveCenter(){
    const data = getCurrentCenterData();
    localStorage.setItem("centerServer", JSON.stringify(data));
    originalCenterData = JSON.parse(JSON.stringify(data));
    toast("Data Center Disimpan");
    checkCenterChange();
}

function loadCenter(){
    const data = JSON.parse(localStorage.getItem("centerServer"));
    if(data){
        ipNama.value = data.ip?.nama || "";
        ipServer.value = data.ip?.server || "";
        ipHost.value = data.ip?.host || "";
        jabberNama.value = data.jabber?.nama || "";
        jabberServer.value = data.jabber?.server || "";
        jabberHost.value = data.jabber?.host || "";
        waCenter.value = data.nomor?.wa || "";
        smsCenter.value = data.nomor?.sms || "";
        originalCenterData = JSON.parse(JSON.stringify(data));
    } else {
        ipNama.value = ""; ipServer.value = ""; ipHost.value = "";
        jabberNama.value = ""; jabberServer.value = ""; jabberHost.value = "";
        waCenter.value = ""; smsCenter.value = "";
        originalCenterData = {};
    }
}

function confirmSaveCenter(){
    showConfirm("Konfirmasi Simpan", "Simpan perubahan Center?", saveCenter);
}

// --- WATCHERS ---
function watchServerChanges(){
    [namaKonter, alamatKonter].forEach(field=>{
        field.addEventListener("input", ()=>{
            checkServerChange();
            autoGrow(field);
        });
    });
}
function watchCenterChanges(){
    [
        ipNama, ipServer, ipHost,
        jabberNama, jabberServer, jabberHost,
        waCenter, smsCenter
    ].forEach(field=>{
        field.addEventListener("input", checkCenterChange);
    });
}

// --- TRANSAKSI MENU ---
let transaksiItems = [];
let originalTransaksi = [];
let activeDeleteIndex = -1;

function getCurrentTransaksi(){
    return JSON.parse(JSON.stringify(transaksiItems));
}
function checkTransaksiChange(){
    if(JSON.stringify(getCurrentTransaksi()) !== JSON.stringify(originalTransaksi)){
        enableButton("saveTransaksiBtn");
    } else {
        disableButton("saveTransaksiBtn");
    }
    updateTransaksiInfo();
}

function openTransaksi(){
    document.getElementById("transaksiModal").classList.add("show");
    loadTransaksi();
    checkTransaksiChange();
}
function closeTransaksi(){
    if(!document.getElementById("saveTransaksiBtn").disabled){
        showConfirm("Perubahan Belum Disimpan", "Yakin ingin keluar tanpa simpan?", ()=>{
            document.getElementById("transaksiModal").classList.remove("show");
        }, "Ya, Keluar");
        return;
    }
    document.getElementById("transaksiModal").classList.remove("show");
}
function updateTransaksiInfo(){
    const totalMenu = transaksiItems.filter(item => item.type === "menu").length;
    const totalKategori = transaksiItems.filter(item => item.type === "kategori").length;
    document.getElementById("transaksiInfo").innerText = `${totalMenu} Menu • ${totalKategori} Kategori`;
}

function addMenu(){
    document.getElementById('btnMenu').classList.add('blink');
    setTimeout(() => { document.getElementById('btnMenu').classList.remove('blink'); }, 500);

    transaksiItems.unshift({
        type: "menu", nama: "Menu Baru", icon: "circle", iconFile: "", checked: false, showDelete: false
    });
    checkTransaksiChange();
    renderTransaksi();
    focusFirstInput();
}

function addKategori(){
    document.getElementById('btnKategori').classList.add('blink');
    setTimeout(() => { document.getElementById('btnKategori').classList.remove('blink'); }, 500);

    transaksiItems.unshift({
        type: "kategori", nama: "Kategori Baru", checked: false, showDelete: false
    });
    checkTransaksiChange();
    renderTransaksi();
    focusFirstInput();
}

function focusFirstInput(){
    setTimeout(()=>{
        const inputs = document.querySelectorAll("#transaksiList input[type='text']");
        if(inputs.length){ inputs[0].focus(); inputs[0].select(); }
    },100);
}

function updateTransaksi(index, value){
    transaksiItems[index].nama = value;
    checkTransaksiChange();
}

function handleInputClick(e, index){
    if(e.target.closest('.btn-delete')) return;

    if(activeDeleteIndex !== -1 && activeDeleteIndex !== index){
        hideAllDeleteButtons();
    }
}

function toggleDeleteButton(index){
    if(transaksiItems[index].type === "kategori") return;

    if(activeDeleteIndex === index){
        transaksiItems[index].showDelete = false;
        activeDeleteIndex = -1;
    } else {
        hideAllDeleteButtons();
        transaksiItems[index].showDelete = true;
        activeDeleteIndex = index;
    }
    renderTransaksi();
}

function hideAllDeleteButtons(){
    transaksiItems.forEach(item => {
        item.showDelete = false;
    });
    activeDeleteIndex = -1;
    renderTransaksi();
}

function renderTransaksi(){
    const list = document.getElementById("transaksiList");
    list.innerHTML = "";

    transaksiItems.forEach((item, index)=>{
        const div = document.createElement("div");
        const safeName = escapeHtml(item.nama);

        if(item.type === "kategori"){
            div.innerHTML = `
            <div class="bg-gradient-to-r from-amber-400 to-orange-500 text-white rounded-2xl p-3 shadow-lg">
                <div class="flex items-center gap-3 h-10">
                    <div onclick="event.stopPropagation(); toggleTransaksi(${index})">
                        <input type="checkbox" ${item.checked ? "checked" : ""} class="w-5 h-5">
                    </div>
                    <i data-lucide="folder-open"></i>
                    <input type="text" value="${safeName}" class="flex-1 bg-transparent outline-none font-bold text-lg" onclick="handleInputClick(event, ${index})" oninput="updateTransaksi(${index}, this.value)">
                </div>
            </div>`;
        } else {
            div.innerHTML = `
            <div class="bg-white rounded-2xl p-3 shadow-lg border border-slate-200 relative">
                <div class="flex items-center gap-3 h-10">
                    <div onclick="event.stopPropagation(); toggleTransaksi(${index})">
                        <input type="checkbox" ${item.checked ? "checked" : ""} class="w-5 h-5">
                    </div>
                    <div onclick="event.stopPropagation(); toggleDeleteButton(${index})" class="w-12 h-12 rounded-xl border border-slate-300 bg-transparent flex items-center justify-center overflow-hidden cursor-pointer">
                        ${item.iconFile ? `<img src="${item.iconFile}" class="w-full h-full object-cover">` : `<i data-lucide="${item.icon}" class="text-cyan-600"></i>`}
                    </div>
                    <span class="font-semibold text-gray-700">${safeName}</span>
                    
                    <button onclick="event.stopPropagation(); deleteTransaksi(${index})" class="btn-delete absolute right-3 top-1/2 -translate-y-1/2 bg-red-500 text-white p-2 rounded-full ${item.showDelete ? 'flex' : 'hidden'}">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>`;
        }

        list.appendChild(div);
    });
    lucide.createIcons();
}

function toggleTransaksi(index){
    hideAllDeleteButtons();
    transaksiItems[index].checked = !transaksiItems[index].checked;
    checkTransaksiChange();
    renderTransaksi();
}

function deleteTransaksi(index){
    const item = transaksiItems[index];

    if(item.checked){
        showConfirm("Gagal Hapus", "Menu yang aktif tidak bisa dihapus!", null, "Oke Mengerti");
        return;
    }

    const namaItem = item.nama;
    showConfirm("Konfirmasi Hapus", `Hapus "${namaItem}"?`, ()=>{
        transaksiItems.splice(index,1);
        activeDeleteIndex = -1;
        checkTransaksiChange();
        renderTransaksi();
    }, "Ya, Hapus");
}

function initSortable(){
    const list = document.getElementById("transaksiList");
    if(!list) return;
    if(sortableInstance) sortableInstance.destroy();
    sortableInstance = new Sortable(list, {
        animation:150,
        handle:".drag-handle",
        onStart: function() {
            hideAllDeleteButtons();
        },
        onEnd:function(evt){
            const movedItem = transaksiItems.splice(evt.oldIndex,1)[0];
            transaksiItems.splice(evt.newIndex,0,movedItem);
            checkTransaksiChange();
        }
    });
}

function saveTransaksi(){
    localStorage.setItem("transaksiItems", JSON.stringify(transaksiItems));
    originalTransaksi = JSON.parse(JSON.stringify(transaksiItems));
    toast("Menu Transaksi Disimpan");
    checkTransaksiChange();
}
function loadTransaksi(){
    const data = JSON.parse(localStorage.getItem("transaksiItems"));
    if(data){
        transaksiItems = data;
    } else {
        transaksiItems = [
            {type:"kategori", nama:"PRODUK DIGITAL", checked:false, showDelete:false},
            {type:"menu", nama:"Pulsa Reguler", icon:"smartphone", iconFile:"", checked:false, showDelete:false},
            {type:"menu", nama:"Paket Data", icon:"wifi", iconFile:"", checked:false, showDelete:false}
        ];
    }
    originalTransaksi = JSON.parse(JSON.stringify(transaksiItems));
    renderTransaksi();
    updateTransaksiInfo();
}

function confirmSaveTransaksi(){
    showConfirm("Konfirmasi Simpan", "Simpan perubahan Menu Transaksi?", saveTransaksi);
}

// --- PREVIEW ---
function openPreview(){
    const modal = document.getElementById("previewModal");
    const content = document.getElementById("previewContent");

    let html = "";
    const serverData = JSON.parse(localStorage.getItem("setupServer")) || { nama:"Nama Konter", alamat:"Alamat Konter" };

    html += `
    <div class="bg-gradient-to-r from-cyan-600 to-blue-600 rounded-3xl p-6 text-white shadow-lg mb-6">
        <div class="text-center">
            <h2 class="text-2xl font-bold">${escapeHtml(serverData.nama)}</h2>
            <p class="text-sm opacity-90 mt-1">${escapeHtml(serverData.alamat)}</p>
        </div>
    </div>
    `;

    transaksiItems.forEach(item=>{
        if(item.type === "kategori"){
            html += `
            <div class="bg-gradient-to-r from-amber-400 to-orange-500 text-white rounded-2xl p-3 shadow-lg mb-4">
                <h3 class="font-bold text-lg">${escapeHtml(item.nama)}</h3>
            </div>
            `;
        } else {
            if(item.checked){
                html += `
                <div class="bg-white rounded-2xl p-3 shadow-lg mb-3 flex items-center gap-4 border border-slate-200">
                    <div class="w-12 h-12 rounded-xl border border-slate-300 bg-transparent flex items-center justify-center overflow-hidden">
                        ${item.iconFile ? `<img src="${item.iconFile}" class="w-full h-full object-cover">` : `<i data-lucide="${item.icon}" class="text-cyan-600"></i>`}
                    </div>
                    <span class="font-semibold text-gray-700">${escapeHtml(item.nama)}</span>
                </div>
                `;
            }
        }
    });

    content.innerHTML = html;
    modal.classList.add("show");
    setTimeout(() => { lucide.createIcons(); }, 50);
}

function closePreview(){
    document.getElementById("previewModal").classList.remove("show");
}

// === INISIALISASI AWAL ===
window.onload = function(){
    watchServerChanges();
    watchCenterChanges();
    loadTransaksi();
};
</script>
</body>
