  <style>


  /* Blok semua seleksi teks secara default */
  * {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    User-select: none;
  }

  /* Izinkan seleksi hanya untuk input dan textarea */
  Input,
  Textarea,
  [contenteditable=”true”] {
    -webkit-user-select: text;
    -moz-user-select: text;
    -ms-user-select: text;
    User-select: text;
  }




    /* 🅰️🅰️ Menu Trx 🅰️🅰️ */

    .submenu-item {
      Transition: transform 0.3s ease, background-color 0.3s ease;
      Position: relative;
    }
    .submenu-item .delete-icon {
      Display: none;
    }
    .submenu-item.show-delete .delete-icon {
      Display: inline-block;
    }
 

  /* 🖥🖥🖥🖥🖥 Server Center 🖥🖥🖥 */

/* ✅ Floating Label */
.floating-input {
  Position: relative;
  Margin-top: 1.5rem;
}
.floating-input input {
  Width: 100%;
  Padding: 10px;
  Border: 1px solid #ccc;
  Border-radius: 5px;
  Outline: none;
}
.floating-input label {
  Position: absolute;
  Left: 12px;
  Top: 50%;
  Transform: translateY(-50%);
  Background: white;
  Padding: 0 5px;
  Color: gray;
  Font-size: 0.9rem;
  Pointer-events: none;
  Transition: all 0.2s;
}
.floating-input input:focus + label,
.floating-input input:not(:placeholder-shown) + label {
  Top: -10px;
  Left: 8px;
  Font-size: 0.75rem;
  Color: #06b6d4;
}

/* ✅ Toast Style */
#toast-message {
  Position: fixed;
  Bottom: 20px;
  Left: 50%;
  Transform: translateX(-50%);
  Background-color: #333;
  Color: white;
  Padding: 10px 20px;
  Border-radius: 8px;
  z-index: 9999;
  transition: opacity 0.3s ease;
  opacity: 0;
}

/* 💠💠💠💠💠 LIST FORMAT */
.floating-input {
  Position: relative;
  Margin-top: 1rem;
}
.floating-input input {
  Width: 100%;
  Padding: 12px;
  Border: 1px solid #ccc;
  Border-radius: 0.75rem;
  Outline: none;
}
.floating-input label {
  Position: absolute;
  Left: 12px;
  Top: 12px;
  Background: white;
  Padding: 0 4px;
  Color: #999;
  Pointer-events: none;
  Transition: 0.2s ease;
}
.floating-input input:focus + label,
.floating-input input:not(:placeholder-shown) + label {
  Top: -5px;
  Left: 8px;
  Font-size: 0.75rem;
  Color: #ccc;
}
Textarea.custom-style {
    Transition: all 0.2s ease;
    Border: 1px solid #d1d5db; /* gray-300 */
    Padding-left: 12px;
    Padding-right: 12px;
    Box-shadow: none;
  }
  Textarea.custom-style:focus {
    Border-color: #3b82f6; /* blue-500 */
    Box-shadow: 0 0 5px rgba(59, 130, 246, 0.3);
  }
  Textarea.custom-style.filled {
    Border-color: #16a34a; /* green-600 */
    Box-shadow: 0 0 4px rgba(22, 163, 74, 0.3);
  }




  :root {
    --radius: 3px; /* Ubah angka ini untuk semua sudut */
  }

  #format-transaksi {
    Border-radius: var(--radius);
  }

  .help-text {
    Border-radius: var(--radius);
  }

  .floating-label {
    Border-radius: calc(var(--radius) / 2); /* Boleh beda jika ingin lebih kecil */
  }



  #notif-simpan {
    Transition: opacity 0.3s ease;
  }

</style>

  Class SetupTransaksi {
  Constructor() {
    This.textareas = {
      formatTransaksi: document.getElementById(‘formatTransaksi’),
      formatQty: document.getElementById(‘formatQty’),
      formatCek: document.getElementById(‘formatCek’),
      formatSN: document.getElementById(‘formatSN’),
      formatCS: document.getElementById(‘formatCS’),
    };

    This.modal = document.getElementById(‘modalSetupTransaksi’);
    This.notif = document.getElementById(‘notif-simpan’);
    This.hasChanges = false;

    This.setupEvents();
    This.loadData();
  }

  setupEvents() {
    Object.values(this.textareas).forEach(textarea => {
      Textarea.addEventListener(‘input’, () => this.handleInputChange());
      Textarea.addEventListener(‘focus’, (e) => this.showHelpText(e.target));
      Textarea.addEventListener(‘blur’, (e) => this.hideHelpText(e.target));
    });

    Window.addEventListener(‘popstate’, () => this.closeModal());
  }

  handleInputChange() {
    this.hasChanges = true;
    Object.entries(this.textareas).forEach(([key, textarea]) => {
      Const label = textarea.previousElementSibling;
      If (label && label.tagName === ‘LABEL’) {
        Label.classList.toggle(‘text-gray-300’, textarea.value.trim() === ‘’);
      }
    });
  }

  showHelpText(textarea) {
    const helpText = textarea.closest(“.relative”).previousElementSibling;
    if (helpText && helpText.classList.contains(“help-text”)) {
      helpText.classList.remove(“scale-0”, “opacity-0”, “pointer-events-none”, “hidden”);
      helpText.classList.add(“scale-100”, “opacity-100”);
    }
  }

  hideHelpText(textarea) {
    const helpText = textarea.closest(“.relative”).previousElementSibling;
    if (helpText && helpText.classList.contains(“help-text”)) {
      helpText.classList.remove(“scale-100”, “opacity-100”);
      helpText.classList.add(“scale-0”, “opacity-0”, “pointer-events-none”);
    }
  }


  openModal() {
    this.modal.classList.remove(‘hidden’);
    history.pushState(null, null, location.href);
  }

  closeModal() {
    if (this.hasChanges && !confirm(“Ada perubahan yang belum disimpan. Tutup tanpa menyimpan?”)) {
      history.pushState(null, null, location.href);
      return;
    }
    This.modal.classList.add(‘hidden’);
    This.hasChanges = false;
  }

  saveData() {
    Object.entries(this.textareas).forEach(([key, textarea]) => {
      localStorage.setItem(key, textarea.value);
    });
    This.hasChanges = false;
    This.showNotification();
  }

  loadData() {
    Object.entries(this.textareas).forEach(([key, textarea]) => {
      Const saved = localStorage.getItem(key);
      If (saved !== null) textarea.value = saved;
    });
    This.handleInputChange();
  }

  showNotification() {
    this.notif.classList.remove(‘hidden’, ‘scale-95’, ‘opacity-0’);
    this.notif.classList.add(‘scale-100’, ‘opacity-100’);
    setTimeout(() => {
      this.notif.classList.remove(‘scale-100’, ‘opacity-100’);
      this.notif.classList.add(‘scale-95’, ‘opacity-0’);
      setTimeout(() => this.notif.classList.add(‘hidden’), 300);
    }, 1000);
  }
}

// Inisialisasi setelah DOM siap
Window.addEventListener(‘DOMContentLoaded’, () => {
  Const setupTransaksi = new SetupTransaksi();

  Window.openSetupTransaksi = () => setupTransaksi.openModal();
  Window.saveSetupTransaksi = () => setupTransaksi.saveData();
});


  
  
  Window.addEventListener(“DOMContentLoaded”, () => {
    Const textareaList = document.querySelectorAll(“textarea”);
    Const btnSimpan = document.getElementById(“btnSimpanFormat”);
    Const modalKonfirmasi = document.getElementById(“popupKonfirmasi”);
    Const btnYa = document.getElementById(“btnYaSimpan”);
    Const btnTidak = document.getElementById(“btnTidakSimpan”);

    Let originalValues = {};
    Let adaPerubahan = false;

    // Load data dari localStorage (jika ada)
    textareaList.forEach(textarea => {
      const savedValue = localStorage.getItem(“textarea_” + textarea.id);
      if (savedValue !== null) {
        textarea.value = savedValue;
      }
      originalValues[textarea.id] = textarea.value;
    });

    Function cekPerubahan() {
      adaPerubahan = Array.from(textareaList).some(textarea => {
        return textarea.value !== originalValues[textarea.id];
      });
      btnSimpan.disabled = !adaPerubahan;
      btnSimpan.classList.toggle(“bg-gray-300”, !adaPerubahan);
      btnSimpan.classList.toggle(“text-gray-500”, !adaPerubahan);
      btnSimpan.classList.toggle(“cursor-not-allowed”, !adaPerubahan);
      btnSimpan.classList.toggle(“bg-green-600”, adaPerubahan);
      btnSimpan.classList.toggle(“text-white”, adaPerubahan);
    }

    textareaList.forEach(textarea => {
    textarea.addEventListener(“input”, () => {
  cekPerubahan();
  // Simpan otomatis setiap perubahan
  localStorage.setItem(“textarea_” + textarea.id, textarea.value);
   });
    });

    // TOMBOL SIMPAN DITEKAN
    btnSimpan.addEventListener(“click”, () => {
      if (adaPerubahan) {
        modalKonfirmasi.classList.remove(“hidden”);
      }
    });

    // TOMBOL YA → Simpan
    btnYa.addEventListener(“click”, () => {
      textareaList.forEach(textarea => {
        originalValues[textarea.id] = textarea.value;

        // Simpan ke localStorage
        localStorage.setItem(“textarea_” + textarea.id, textarea.value);
      });
      modalKonfirmasi.classList.add(“hidden”);
      adaPerubahan = false;
      cekPerubahan();

      // ✅ Notifikasi simpan
      Const notif = document.createElement(“div”);
      Notif.innerText = “✅ Perubahan berhasil disimpan.”;
      Notif.className = “fixed top-4 left-1/2 transform -translate-x-1/2 bg-green-600 text-white px-4 py-2 rounded shadow-lg z-[99999]”;
      Document.body.appendChild(notif);
      setTimeout(() => notif.remove(), 3000);
    });

    // TOMBOL TIDAK → Batalkan Perubahan
    btnTidak.addEventListener(“click”, () => {
      textareaList.forEach(textarea => {
        textarea.value = originalValues[textarea.id];
      });
      modalKonfirmasi.classList.add(“hidden”);
      adaPerubahan = false;
      cekPerubahan();
    });

    cekPerubahan(); // inisialisasi kondisi tombol saat load
  });

  // ↩️↩️ Tombol Kembali
  Let formChanged = false;

  // Deteksi perubahan di semua textarea
  Document.querySelectorAll(“textarea”).forEach(textarea => {
    Textarea.addEventListener(“input”, () => {
      formChanged = true;
    });
  });

  // Tombol YA di popup konfirmasi kembali
  Document.getElementById(“btnKembaliYa”).addEventListener(“click”, () => {
    Document.getElementById(“popupKonfirmasiKembali”).classList.add(“hidden”);

    // Reset semua textarea ke data terakhir tersimpan
    Document.querySelectorAll(“#modalSetupTransaksi textarea”).forEach(textarea => {
      Const savedValue = localStorage.getItem(“textarea_” + textarea.id);
      Textarea.value = savedValue ?? textarea.defaultValue;
    });

    formChanged = false;
    document.getElementById(“modalSetupTransaksi”).classList.add(“hidden”);
    document.getElementById(“modalMenuTransaksi”).classList.remove(“hidden”);
  });

  // Tombol TIDAK di popup konfirmasi kembali
  Document.getElementById(“btnKembaliTidak”).addEventListener(“click”, () => {
    Document.getElementById(“popupKonfirmasiKembali”).classList.add(“hidden”);
  });

  // Tombol kembali HP (Android)
  Window.addEventListener(“popstate”, function (event) {
    If (document.getElementById(“modalSetupTransaksi”).classList.contains(“flex”)) {
      If (formChanged) {
        History.pushState(null, null); // cegah keluar
        Document.getElementById(“popupKonfirmasiKembali”).classList.remove(“hidden”);
      } else {
        Document.getElementById(“modalSetupTransaksi”).classList.add(“hidden”);
        Document.getElementById(“modalMenuTransaksi”).classList.remove(“hidden”);
      }
    }
  });

  // Push initial state untuk tracking tombol kembali
  History.pushState(null, null);


 </script>
