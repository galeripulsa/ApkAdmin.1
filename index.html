<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin Galeri Pulsa V2</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Lucide Icon -->
<script src="https://unpkg.com/lucide@latest"></script>

<!-- Sortable -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<style>

/* ===============================
   GLOBAL STYLE
================================ */

body{
    background:#f1f5f9;
}

/* ===============================
   MENU AKTIF
================================ */

.menu-active{
    background:linear-gradient(135deg,#0891b2,#2563eb);
    color:white;
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.menu-active .menu-label,
.menu-active i{
    color:white;
}

/* ===============================
   CARD MENU
================================ */

.card-menu{
    transition:.25s;
}

.card-menu:hover{
    transform:translateY(-4px);
}

/* ===============================
   MODAL
================================ */

.modal{
    display:none;
}

.modal.show{
    display:flex;
}

/* ===============================
   FLOATING LABEL
================================ */

.floating{
    position:relative;
    margin-top:20px;
}

.floating input,
.floating textarea{
    width:100%;
    border:1px solid #cbd5e1;
    border-radius:12px;
    padding:14px;
    outline:none;
    background:white;
}

.floating label{
    position:absolute;
    left:12px;
    top:14px;
    background:white;
    padding:0 6px;
    color:#94a3b8;
    transition:.2s;
    pointer-events:none;
}

.floating input:focus + label,
.floating input:not(:placeholder-shown) + label,
.floating textarea:focus + label,
.floating textarea:not(:placeholder-shown) + label{

    top:-10px;
    font-size:12px;
    color:#0891b2;
}

/* ===============================
   TOAST
================================ */

.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#16a34a;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    display:none;
    z-index:9999;
}

/* ===============================
   DRAG HANDLE
================================ */

.drag-handle{
    cursor:grab;
    touch-action:none;
}

.drag-handle:active{
    cursor:grabbing;
}

/* ===============================
   SORTABLE EFFECT
================================ */

#transaksiList > div{
    margin-bottom:10px;
}

#transaksiList .sortable-ghost{
    opacity:.4;
}

#transaksiList .sortable-chosen{
    transform:scale(1.02);
}

</style>

</head>

<body class="max-w-screen-md mx-auto p-4">

<!-- ======================================================
     HEADER
====================================================== -->

<div class="bg-gradient-to-r from-cyan-600 to-blue-600 rounded-3xl p-6 text-white shadow-lg">

    <div class="flex items-center gap-4">

<div id="menuGrid"
class="grid grid-cols-2 sm:grid-cols-3 gap-4 mt-6">

<!-- ======================================================
     SETUP SERVER

<div id="serverModal"
     class="modal fixed inset-0 bg-white z-50 items-center justify-center p-4">

    <div class="bg-white w-full max-w-4xl rounded-3xl shadow-xl p-6">

<!-- ======================================================

<div id="centerModal"

    <div class="w-full px-2">

        <!-- HEADER -->

            <h2 class="font-bold text-xl">

        </div>

        <!-- GRID -->

</div>


<!-- ======================================================
     MODAL KONFIRMASI
====================================================== -->

<div id="confirmModal"
     class="hidden fixed inset-0 bg-black/50 z-[9999] flex items-center justify-center p-5">

    <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl">

        <h3 id="confirmTitle"

<!-- ======================================================

<div id="transaksiModal"

        ====================================================== -->

<!-- ======================================================
     SCRIPT
====================================================== -->

<script>

window.onerror = function(message, source, line, column){
    console.error(
        "ERROR:",
        message,
        "Baris:", line
    );
};


let centerChanged = false;
let serverChanged = false;
let transaksiChanged = false;

let confirmAction = null;

let sortableInstance = null;

let selectedIconIndex = null;

/* ======================================================
   MENU UTAMA
====================================================== */

const menus = [

    {
        label:"Setup Server",
        icon:"server",
        action:"server"
    },

    {
        label:"Setup Center",
        icon:"database",
        action:"center"
    },

    {
        label:"Menu Transaksi",
        icon:"layout-grid",
        action:"transaksi"
    },

    {
        label:"Prabayar",
        icon:"smartphone"
    },

    {
        label:"Pascabayar",
        icon:"credit-card"
    },

    {
        label:"Format Request",
        icon:"file-text"
    },

    {
        label:"Logo",
        icon:"image"
    },

    {
        label:"OTP",
        icon:"key-round"
    },

    {
        label:"Poin",
        icon:"star"
    },

    {
        label:"Downline",
        icon:"users"
    }

];



/* ======================================================
   RENDER MENU UTAMA
====================================================== */

function renderMenus(){

    const grid = document.getElementById("menuGrid");

    if(!grid){
        console.error("menuGrid tidak ditemukan");
        return;
    }

    grid.innerHTML = "";

    menus.forEach((menu,index)=>{

        const card = document.createElement("div");

        card.className =
        "card-menu bg-white rounded-2xl shadow p-4 text-center cursor-pointer";

        card.dataset.index = index;

        card.innerHTML = `
            <div class="flex justify-center mb-3">
                <i data-lucide="${menu.icon}"></i>
            </div>

            <div class="menu-label font-semibold text-gray-700">
                ${menu.label}
            </div>
        `;

        card.onclick = ()=>{

            document.querySelectorAll(".card-menu")
            .forEach(el=>el.classList.remove("menu-active"));

            card.classList.add("menu-active");

            if(menu.action==="server"){
                openServer();
            }

            if(menu.action==="center"){
                openCenter();
            }

            if(menu.action==="transaksi"){
                openTransaksi();
            }

        };

        grid.appendChild(card);

    });

    lucide.createIcons();

}


/* ======================================================
   TOAST
====================================================== */

function toast(msg){

    const t =
    document.getElementById("toast");

    t.innerText = msg;

    t.style.display = "block";

    setTimeout(()=>{
        t.style.display = "none";
    },2500);

}


/* ======================================================
   BUTTON
====================================================== */

function enableButton(btnId){

    const btn =
    document.getElementById(btnId);

    btn.disabled = false;

    btn.classList.remove(
        "bg-gray-400",
        "cursor-not-allowed"
    );

    btn.classList.add("bg-green-600");

}

function disableButton(btnId){

    const btn =
    document.getElementById(btnId);

    btn.disabled = true;

    btn.classList.remove("bg-green-600");

    btn.classList.add(
        "bg-gray-400",
        "cursor-not-allowed"
    );

}


/* ======================================================
   MODAL KONFIRMASI
====================================================== */

function showConfirm(title,message,action){

    document.getElementById("confirmTitle")
    .innerText = title;

    document.getElementById("confirmMessage")
    .innerText = message;

    confirmAction = action;

    document.getElementById("confirmModal")
    .classList.remove("hidden");

}

function closeConfirm(){

    document.getElementById("confirmModal")
    .classList.add("hidden");

}

function executeConfirm(){

    if(typeof confirmAction === "function"){
        confirmAction();
    }

    closeConfirm();

}


/* ======================================================
   SETUP SERVER
====================================================== */

function openServer(){

    document
    .getElementById("serverModal")
    .classList.add("show");

    loadServer();

    serverChanged = false;

    disableButton("saveServerBtn");

}

function closeServer(){

    document
    .getElementById("serverModal")
    .classList.remove("show");

}

function saveServer(){

    localStorage.setItem(
        "setupServer",
        JSON.stringify({
            nama:namaKonter.value,
            alamat:alamatKonter.value
        })
    );

    serverChanged = false;

    disableButton("saveServerBtn");

    toast("Data Server Disimpan");

}

function confirmSaveServer(){

    if(!serverChanged) return;

    showConfirm(
        "Konfirmasi Simpan",
        "Apakah Anda yakin ingin menyimpan perubahan Server?",
        saveServer
    );

}

function checkCloseServer(){

    if(serverChanged){

        showConfirm(
            "Perubahan Belum Disimpan",
            "Yakin ingin keluar?",
            closeServer
        );

        return;
    }

    closeServer();

}

function loadServer(){

    const data =
    JSON.parse(
        localStorage.getItem("setupServer")
    );

    if(!data) return;

    namaKonter.value = data.nama || "";
    alamatKonter.value = data.alamat || "";

}


/* ======================================================
   SETUP CENTER
====================================================== */

function openCenter(){

    document
    .getElementById("centerModal")
    .classList.add("show");

    loadCenter();

    centerChanged = false;

    disableButton("saveCenterBtn");

}

function closeCenter(){

    document
    .getElementById("centerModal")
    .classList.remove("show");

}

function saveCenter(){

    localStorage.setItem(
        "centerServer",
        JSON.stringify({

            ip:{
                nama:ipNama.value,
                server:ipServer.value,
                host:ipHost.value
            },

            jabber:{
                nama:jabberNama.value,
                server:jabberServer.value,
                host:jabberHost.value
            },

            nomor:{
                wa:waCenter.value,
                sms:smsCenter.value
            }

        })
    );

    centerChanged = false;

    disableButton("saveCenterBtn");

    toast("Data Center Disimpan");

}

function confirmSaveCenter(){

    if(!centerChanged) return;

    showConfirm(
        "Konfirmasi Simpan",
        "Apakah Anda yakin ingin menyimpan perubahan Center?",
        saveCenter
    );

}

function checkCloseCenter(){

    if(centerChanged){

        showConfirm(
            "Perubahan Belum Disimpan",
            "Yakin ingin keluar?",
            closeCenter
        );

        return;
    }

    closeCenter();

}

function loadCenter(){

    const data =
    JSON.parse(
        localStorage.getItem("centerServer")
    );

    if(!data) return;

    ipNama.value = data.ip?.nama || "";
    ipServer.value = data.ip?.server || "";
    ipHost.value = data.ip?.host || "";

    jabberNama.value = data.jabber?.nama || "";
    jabberServer.value = data.jabber?.server || "";
    jabberHost.value = data.jabber?.host || "";

    waCenter.value = data.nomor?.wa || "";
    smsCenter.value = data.nomor?.sms || "";

}


/* ======================================================
   WATCH INPUT
====================================================== */

function watchServerChanges(){

    [namaKonter,alamatKonter]
    .forEach(field=>{

        field.addEventListener("input",()=>{

            serverChanged = true;

            enableButton("saveServerBtn");

        });

    });

}

function watchCenterChanges(){

[
document.getElementById("ipNama"),
document.getElementById("ipServer"),
document.getElementById("ipHost"),

document.getElementById("jabberNama"),
document.getElementById("jabberServer"),
document.getElementById("jabberHost"),

document.getElementById("waCenter"),
document.getElementById("smsCenter")

].forEach(field=>{

    if(!field) return;

    field.addEventListener("input",()=>{

        centerChanged = true;

        enableButton("saveCenterBtn");

    });

});

}


/* ======================================================
   MENU TRANSAKSI
====================================================== */

/* Gunakan seluruh fungsi renderTransaksi(),
   addMenu(),
   addKategori(),
   toggleTransaksi(),
   swipeLeft(),
   swipeRight(),
   updateTransaksi(),
   hapusTransaksi(),
   initDragDrop(),
   saveTransaksi(),
   loadTransaksi()
   dari kode Part 2 yang sudah Anda kirim sebelumnya,
   karena struktur tersebut sudah benar dan hanya perlu
   dipindahkan ke bawah bagian ini tanpa perubahan.
*/


function confirmSaveTransaksi(){

    if(!transaksiChanged) return;

    showConfirm(
        "Konfirmasi Simpan",
        "Apakah Anda yakin ingin menyimpan Menu Transaksi?",
        saveTransaksi
    );

}


/* ======================================================
   INISIALISASI
====================================================== */


/* ===================================================== */
/* MENU TRANSAKSI - DATA DAN FUNGSI DASAR */
/* ===================================================== */

let transaksiItems =
JSON.parse(localStorage.getItem("transaksiItems")) || [

    {
        type:"kategori",
        nama:"PRODUK DIGITAL",
        checked:false,
        swiped:false
    },

    {
        type:"menu",
        nama:"Pulsa Reguler",
        icon:"smartphone",
        iconFile:"",
        checked:false,
        swiped:false
    },

    {
        type:"menu",
        nama:"Paket Data",
        icon:"wifi",
        iconFile:"",
        checked:false,
        swiped:false
    }

];


/* ===================================================== */
/* BUKA MENU TRANSAKSI */
/* ===================================================== */

function openTransaksi(){

    document
        .getElementById("transaksiModal")
        .classList.add("show");

    loadTransaksi();

    transaksiChanged = false;

    disableButton("saveTransaksiBtn");
}


/* ===================================================== */
/* TUTUP MENU TRANSAKSI */
/* ===================================================== */

function closeTransaksi(){

    if(transaksiChanged){

        showConfirm(
            "Perubahan Belum Disimpan",
            "Yakin ingin keluar tanpa menyimpan perubahan?",
            function(){

                transaksiChanged = false;

                document
                    .getElementById("transaksiModal")
                    .classList.remove("show");

            }
        );

        return;
    }

    document
        .getElementById("transaksiModal")
        .classList.remove("show");
}


/* ===================================================== */
/* UPDATE JUMLAH MENU DAN KATEGORI */
/* ===================================================== */

function updateTransaksiInfo(){

    const totalMenu =
        transaksiItems.filter(
            item => item.type === "menu"
        ).length;

    const totalKategori =
        transaksiItems.filter(
            item => item.type === "kategori"
        ).length;

    document.getElementById(
        "transaksiInfo"
    ).innerText =
    `${totalMenu} Menu • ${totalKategori} Kategori`;
}


/* ===================================================== */
/* TAMBAH MENU */
/* ===================================================== */

function addMenu(){

    transaksiItems.unshift({

        type: "menu",

        nama: "Menu Baru",

        icon: "circle",

        iconFile: "",

        checked: false,

        swiped: false
    });

    transaksiChanged = true;

    enableButton("saveTransaksiBtn");

    renderTransaksi();

    fokusInputPertama();
}


/* ===================================================== */
/* TAMBAH KATEGORI */
/* ===================================================== */

function addKategori(){

    transaksiItems.unshift({

        type: "kategori",

        nama: "Kategori Baru",

        checked: false,

        swiped: false
    });

    transaksiChanged = true;

    enableButton("saveTransaksiBtn");

    renderTransaksi();

    fokusInputPertama();
}


/* ===================================================== */
/* FOKUS INPUT PERTAMA */
/* ===================================================== */

function fokusInputPertama(){

    setTimeout(function(){

        const inputs =
            document.querySelectorAll(
                "#transaksiList input[type='text']"
            );

        if(inputs.length){

            inputs[0].focus();

            inputs[0].select();
        }

    },100);
}


/* ===================================================== */
/* UPDATE NAMA MENU/KATEGORI */
/* ===================================================== */

function updateTransaksi(index,value){

    transaksiItems[index].nama = value;

    transaksiChanged = true;

    enableButton("saveTransaksiBtn");
}


/* ===================================================== */
/* CENTANG MENU */
/* ===================================================== */

function toggleTransaksi(index){

    transaksiItems[index].checked =
        !transaksiItems[index].checked;

    transaksiChanged = true;

    enableButton("saveTransaksiBtn");

    renderTransaksi();
}


/* ===================================================== */
/* SWIPE KIRI */
/* ===================================================== */

function swipeLeft(index){

    transaksiItems.forEach(function(item,i){

        item.swiped = (i === index);

    });

    renderTransaksi();
}


/* ===================================================== */
/* SWIPE KANAN */
/* ===================================================== */

function swipeRight(index){

    transaksiItems[index].swiped = false;

    renderTransaksi();
}


/* ===================================================== */
/* MENU TRANSAKSI - RENDER LIST */
/* ===================================================== */

function renderTransaksi(){

    const list =
    document.getElementById("transaksiList");

    list.innerHTML = "";

    transaksiItems.forEach((item,index)=>{

        const div =
        document.createElement("div");

        /* ===== KATEGORI ===== */

        if(item.type === "kategori"){

            div.innerHTML = `

            <div class="
            bg-gradient-to-r
            from-amber-400
            to-orange-500
            text-white
            rounded-2xl
            p-4
            shadow-lg">

                <div class="flex items-center gap-3">

                    <input
                    type="checkbox"
                    ${item.checked ? "checked" : ""}
                    onchange="toggleTransaksi(${index})"
                    class="w-5 h-5">

                    <i data-lucide="folder-open"></i>

                    <input
                    type="text"
                    value="${item.nama}"
                    class="
                    flex-1
                    bg-transparent
                    outline-none
                    font-bold
                    text-lg"
                    oninput="updateTransaksi(${index},this.value)">

                    <div class="ml-auto flex items-center gap-2">

                        ${item.swiped ? `

                        <button
                        onclick="hapusTransaksi(${index})"
                        class="
                        bg-red-500
                        text-white
                        w-10
                        h-10
                        rounded-xl
                        flex
                        items-center
                        justify-center">

                            <i data-lucide="trash-2"></i>

                        </button>

                        ` : ""}

                        <i
                        data-lucide="grip-vertical"
                        class="drag-handle cursor-move">
                        </i>

                    </div>

                </div>

            </div>
            `;

        }

        /* ===== MENU ===== */

        else{

            div.innerHTML = `

            <div class="
            ${item.checked
                ? "bg-green-50 border-2 border-green-500"
                : "bg-white border border-slate-200"}
            rounded-2xl
            p-4
            shadow-sm">

                <div class="flex items-center gap-3">

                    <input
                    type="checkbox"
                    ${item.checked ? "checked" : ""}
                    onchange="toggleTransaksi(${index})"
                    class="w-5 h-5">

                  
  <div
onclick="gantiIcon(${index})"
class="
w-12 h-12
rounded-xl
bg-cyan-100
flex
items-center
justify-center
overflow-hidden
cursor-pointer">

                        ${
                        item.iconFile
                        ? `<img src="${item.iconFile}"
                             class="w-full h-full object-cover">`
                        : `<i data-lucide="${item.icon}"></i>`
                        }

                    </div>

                    <div class="flex-1">

                        <input
type="text"
value="${item.nama}"
class="
w-full
outline-none
bg-transparent
font-semibold"
oninput="updateTransaksi(${index},this.value)">

                    </div>

                    <div class="ml-auto flex items-center gap-2">

                        ${item.swiped ? `

                        <button
                        onclick="hapusTransaksi(${index})"
                        class="
                        bg-red-500
                        text-white
                        w-10
                        h-10
                        rounded-xl
                        flex
                        items-center
                        justify-center">

                            <i data-lucide="trash-2"></i>

                        </button>

                        ` : ""}

                        <i
                        data-lucide="grip-vertical"
                        class="
                        drag-handle
                        cursor-move
                        text-slate-400">
                        </i>

                    </div>

                </div>

            </div>
            `;
        }

        /* ===== SWIPE ===== */

        let startX = 0;

        div.addEventListener("touchstart",(e)=>{

            startX =
            e.touches[0].clientX;

        });

        div.addEventListener("touchend",(e)=>{

            const endX =
            e.changedTouches[0].clientX;

            const diff =
            startX - endX;

            if(diff > 80){

                swipeLeft(index);

            }

            if(diff < -80){

                swipeRight(index);

            }

        });

        list.appendChild(div);

    });

    updateTransaksiInfo();

    lucide.createIcons();

    initDragDrop();
}


/* ===================================================== */
/* HAPUS ITEM */
/* ===================================================== */

function hapusTransaksi(index){

    const namaItem =
    transaksiItems[index].nama;

    showConfirm(
        "Konfirmasi Hapus",
        `Yakin ingin menghapus "${namaItem}" ?`,
        ()=>{

            transaksiItems.splice(index,1);

            transaksiChanged = true;

            enableButton(
                "saveTransaksiBtn"
            );

            renderTransaksi();

        }
    );
}


/* ===================================================== */
/* DRAG & DROP */
/* ===================================================== */

function initDragDrop(){

    const list =
    document.getElementById("transaksiList");

    if(!list) return;

    if(sortableInstance){

        sortableInstance.destroy();

    }

    sortableInstance =
    Sortable.create(list,{

        animation:150,

        handle:".drag-handle",

        delay:500,

        delayOnTouchOnly:true,

        onEnd:function(evt){

            const moved =
            transaksiItems.splice(
                evt.oldIndex,
                1
            )[0];

            transaksiItems.splice(
                evt.newIndex,
                0,
                moved
            );

            transaksiChanged = true;

            enableButton(
                "saveTransaksiBtn"
            );

            renderTransaksi();

        }

    });

}

/* ===================================================== */
/* SIMPAN MENU TRANSAKSI */
/* ===================================================== */

function saveTransaksi(){

    localStorage.setItem(
        "transaksiItems",
        JSON.stringify(transaksiItems)
    );

    transaksiChanged = false;

    disableButton("saveTransaksiBtn");

    toast("Menu Transaksi berhasil disimpan");

    loadTransaksi();

}

/* ===================================================== */
/* LOAD MENU TRANSAKSI */
/* ===================================================== */

function loadTransaksi(){

    const data =
    localStorage.getItem("transaksiItems");

    if(data){

        transaksiItems =
        JSON.parse(data);

    }

    transaksiItems.forEach(item=>{

        if(item.checked === undefined){

            item.checked = false;

        }

        if(item.swiped === undefined){

            item.swiped = false;

        }

        if(item.icon === undefined){

            item.icon = "circle";

        }

        if(item.iconFile === undefined){

            item.iconFile = "";

        }

    });

    renderTransaksi();

    updateTransaksiInfo();

}


function gantiIcon(index){

    const picker = document.createElement("input");

    picker.type = "file";
    picker.accept = "image/*";

    picker.onchange = function(e){

        const file = e.target.files[0];

        if(!file) return;

        const reader = new FileReader();

        reader.onload = function(evt){

            transaksiItems[index].iconFile = evt.target.result;

            transaksiChanged = true;

            enableButton("saveTransaksiBtn");

            renderTransaksi();

        };

        reader.readAsDataURL(file);

    };

    picker.click();

}

window.onload = function(){

    renderMenus();

    watchServerChanges();

    watchCenterChanges();

};

</script>

</body>
</html>
