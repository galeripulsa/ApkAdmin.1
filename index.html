<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin Galeri Pulsa V2</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Lucide Icon -->
<script src="https://unpkg.com/lucide@latest"></script>

<!-- Sortable -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<style>

/* ===============================
   GLOBAL STYLE
================================ */

body{
    background:#f1f5f9;
}

/* ===============================
   MENU AKTIF
================================ */

.menu-active{
    background:linear-gradient(135deg,#0891b2,#2563eb);
    color:white;
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.menu-active .menu-label,
.menu-active i{
    color:white;
}

/* ===============================
   CARD MENU
================================ */

.card-menu{
    transition:.25s;
}

.card-menu:hover{
    transform:translateY(-4px);
}

/* ===============================
   MODAL
================================ */

.modal{
    display:none;
}

.modal.show{
    display:flex;
}

/* ===============================
   FLOATING LABEL
================================ */

.floating{
    position:relative;
    margin-top:20px;
}

.floating input,
.floating textarea{
    width:100%;
    border:1px solid #cbd5e1;
    border-radius:12px;
    padding:14px;
    outline:none;
    background:white;
}

.floating label{
    position:absolute;
    left:12px;
    top:14px;
    background:white;
    padding:0 6px;
    color:#94a3b8;
    transition:.2s;
    pointer-events:none;
}

.floating input:focus + label,
.floating input:not(:placeholder-shown) + label,
.floating textarea:focus + label,
.floating textarea:not(:placeholder-shown) + label{

    top:-10px;
    font-size:12px;
    color:#0891b2;
}

/* ===============================
   TOAST
================================ */

.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#16a34a;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    display:none;
    z-index:9999;
}

/* ===============================
   DRAG HANDLE
================================ */

.drag-handle{
    cursor:grab;
    touch-action:none;
}

.drag-handle:active{
    cursor:grabbing;
}

/* ===============================
   SORTABLE EFFECT
================================ */

#transaksiList > div{
    margin-bottom:10px;
}

#transaksiList .sortable-ghost{
    opacity:.4;
}

#transaksiList .sortable-chosen{
    transform:scale(1.02);
}

</style>

</head>

<body class="max-w-screen-md mx-auto p-4">

<!-- ======================================================
     HEADER
====================================================== -->

<div class="bg-gradient-to-r from-cyan-600 to-blue-600 rounded-3xl p-6 text-white shadow-lg">

    <div class="flex items-center gap-4">

        <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center">

            <i data-lucide="shield" class="text-cyan-600"></i>

        </div>

        <div>

            <h1 class="text-2xl font-bold">
                Admin Galeri Pulsa
            </h1>

            <p class="text-sm opacity-90">
                agusbaba1987@gmail.com
            </p>

        </div>

    </div>

</div>

<!-- ======================================================
     MENU UTAMA
====================================================== -->

<div id="menuGrid"
     class="grid grid-cols-2 sm:grid-cols-3 gap-4 mt-6">

</div>
