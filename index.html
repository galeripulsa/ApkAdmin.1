<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Setup</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.7); z-index: 50; align-items: center; justify-content: center; padding: 1rem; }
    .modal.show { display: flex; animation: fadeIn 0.2s ease; }
    .modal-card { background: white; border-radius: 24px; width: 100%; max-width: 480px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    .blink { animation: blink 0.5s ease; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    textarea { resize: none; overflow: hidden; }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 999px; opacity: 0; transition: all 0.3s; z-index: 999; }
    .toast.show { opacity: 1; bottom: 3rem; }
    .confirm-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 60; align-items: center; justify-content: center; }
    .confirm-modal.show { display: flex; }
    .sortable-ghost { opacity: 0.4; background: #e0f2fe; }
    
    /* STYLE UNTUK INPUT ANIMASI LABEL */
    .input-group { position: relative; }
    .input-group input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 16px;
        background: transparent;
        outline: none;
        transition: all 0.2s;
    }
    .input-group input:focus { border-color: #06b6d4; }
    .input-group label {
        position: absolute;
        left: 16px;
        top: 14px;
        color: #94a3b8;
        pointer-events: none;
        transition: 0.2s ease all;
        background: white;
        padding: 0 4px;
    }
    .input-group input:focus ~ label,
    .input-group input:not(:placeholder-shown) ~ label {
        top: -8px;
        left: 12px;
        font-size: 12px;
        color: #06b6d4;
    }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-6 space-y-6">
    <div class="text-center">
        <h1 class="text-2xl font-bold text-slate-800">SERVER SETUP</h1>
        <p class="text-slate-500 text-sm">Konfigurasi Server & Aplikasi</p>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <button onclick="openServer()" class="bg-gradient-to-br from-cyan-500 to-cyan-600 text-white p-4 rounded-2xl shadow-lg flex flex-col items-center gap-2 hover:scale-105 transition">
            <i data-lucide="server" class="w-8 h-8"></i>
            <span class="font-semibold">Data Server</span>
        </button>
        <button onclick="openCenter()" class="bg-gradient-to-br from-blue-500 to-blue-600 text-white p-4 rounded-2xl shadow-lg flex flex-col items-center gap-2 hover:scale-105 transition">
            <i data-lucide="radio" class="w-8 h-8"></i>
            <span class="font-semibold">Data Center</span>
        </button>
        <button onclick="openTransaksi()" class="bg-gradient-to-br from-amber-400 to-orange-500 text-white p-4 rounded-2xl shadow-lg flex flex-col items-center gap-2 hover:scale-105 transition">
            <i data-lucide="layout-grid" class="w-8 h-8"></i>
            <span class="font-semibold">Menu Transaksi</span>
        </button>
        <button onclick="openPreview()" class="bg-gradient-to-br from-slate-600 to-slate-700 text-white p-4 rounded-2xl shadow-lg flex flex-col items-center gap-2 hover:scale-105 transition">
            <i data-lucide="eye" class="w-8 h-8"></i>
            <span class="font-semibold">Preview</span>
        </button>
    </div>

    <div class="text-center text-xs text-slate-400 pt-4">
        Version 1.0 • All Rights Reserved
    </div>
</div>

<!-- MODAL SERVER -->
<div id="serverModal" class="modal">
    <div class="modal-card">
        <div class="p-5 border-b flex items-center justify-between">
            <h3 class="font-bold text-lg">Data Server</h3>
            <button onclick="checkCloseServer()" class="text-slate-400 hover:text-red-500"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div class="p-5 space-y-4">
            <div class="relative">
                <textarea id="namaKonter" class="w-full px-4 py-3 rounded-xl border border-slate-300 outline-none focus:border-cyan-500 transition-all" placeholder=" " rows="1"></textarea>
                <label class="absolute left-4 top-3 text-slate-400 pointer-events-none transition-all">Nama Konter</label>
            </div>
            <div class="relative">
                <textarea id="alamatKonter" class="w-full px-4 py-3 rounded-xl border border-slate-300 outline-none focus:border-cyan-500 transition-all" placeholder=" " rows="1"></textarea>
                <label class="absolute left-4 top-3 text-slate-400 pointer-events-none transition-all">Alamat Konter</label>
            </div>
        </div>
        <div class="p-5 border-t bg-slate-50 flex gap-3">
            <button id="saveServerBtn" onclick="confirmSaveServer()" class="flex-1 bg-cyan-600 text-white py-3 rounded-xl font-semibold disabled:opacity-50 disabled:cursor-not-allowed" disabled>SIMPAN</button>
        </div>
    </div>
</div>

<!-- MODAL CENTER -->
<div id="centerModal" class="modal">
    <div class="modal-card">
        <div class="p-5 border-b flex items-center justify-between">
            <h3 class="font-bold text-lg">Data Center</h3>
            <button onclick="checkCloseCenter()" class="text-slate-400 hover:text-red-500"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div class="p-5 space-y-4">
            <p class="text-sm font-semibold text-slate-500">IP SERVER</p>
            <div class="grid grid-cols-3 gap-2">
                <div class="relative">
                    <input id="ipNama" type="text" class="w-full px-3 py-2 rounded-xl border border-slate-300" placeholder=" ">
                    <label class="absolute left-3 top-2 text-slate-400 text-sm">Nama</label>
                </div>
                <div class="relative">
                    <input id="ipServer" type="text" class="w-full px-3 py-2 rounded-xl border border-slate-300" placeholder=" ">
                    <label class="absolute left-3 top-2 text-slate-400 text-sm">Server</label>
                </div>
                <div class="relative">
                    <input id="ipHost" type="text" class="w-full px-3 py-2 rounded-xl border border-slate-300" placeholder=" ">
                    <label class="absolute left-3 top-2 text-slate-400 text-sm">Host</label>
                </div>
            </div>

            <p class="text-sm font-semibold text-slate-500">JABBER</p>
            <div class="grid grid-cols-3 gap-2">
                <div class="relative">
                    <input id="jabberNama" type="text" class="w-full px-3 py-2 rounded-xl border border-slate-300" placeholder=" ">
                    <label class="absolute left-3 top-2 text-slate-400 text-sm">Nama</label>
                </div>
                <div class="relative">
                    <input id="jabberServer" type="text" class="w-full px-3 py-2 rounded-xl border border-slate-300" placeholder=" ">
                    <label class="absolute left-3 top-2 text-slate-400 text-sm">Server</label>
                </div>
                <div class="relative">
                    <input id="jabberHost" type="text" class="w-full px-3 py-2 rounded-xl border border-slate-300" placeholder=" ">
                    <label class="absolute left-3 top-2 text-slate-400 text-sm">Host</label>
                </div>
            </div>

            <p class="text-sm font-semibold text-slate-500">CENTER NUMBER</p>
            <div class="grid grid-cols-2 gap-2">
                <div class="relative">
                    <input id="waCenter" type="text" class="w-full px-3 py-2 rounded-xl border border-slate-300" placeholder=" ">
                    <label class="absolute left-3 top-2 text-slate-400 text-sm">WhatsApp</label>
                </div>
                <div class="relative">
                    <input id="smsCenter" type="text" class="w-full px-3 py-2 rounded-xl border border-slate-300" placeholder=" ">
                    <label class="absolute left-3 top-2 text-slate-400 text-sm">SMS Center</label>
                </div>
            </div>
        </div>
        <div class="p-5 border-t bg-slate-50">
            <button id="saveCenterBtn" onclick="confirmSaveCenter()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold disabled:opacity-50" disabled>SIMPAN</button>
        </div>
    </div>
</div>

<!-- MODAL MENU TRANSAKSI -->
<div id="transaksiModal" class="modal">
    <div class="modal-card">
        <div class="p-5 border-b flex items-center justify-between">
            <h3 class="font-bold text-lg">Menu Transaksi</h3>
            <div class="text-xs text-slate-500" id="transaksiInfo">0 Menu • 0 Kategori</div>
            <button onclick="closeTransaksi()" class="text-slate-400 hover:text-red-500"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div class="p-5 space-y-4 max-h-[60vh] overflow-y-auto">
            
            <!-- BAGIAN PDAM YANG SUDAH DIPERBAIKI -->
            <div class="bg-gradient-to-r from-amber-400 to-orange-500 rounded-2xl p-4 shadow-lg text-white">
                <h4 class="font-bold text-lg mb-4">PDAM</h4>
                
                <div id="pdamContainer" class="space-y-4">
                    <!-- ITEM PERTAMA -->
                    <div class="bg-white rounded-xl p-4 text-slate-700">
                        <div class="space-y-3">
                            <div class="input-group">
                                <input type="text" id="wilayah0" placeholder=" ">
                                <label>Wilayah</label>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="input-group">
                                    <input type="text" id="cek0" placeholder=" ">
                                    <label>Kode Cek</label>
                                </div>
                                <div class="input-group">
                                    <input type="text" id="bayar0" placeholder=" ">
                                    <label>Kode Bayar</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TOMBOL TAMBAH PRODUK -->
                <button onclick="tambahProdukPDAM()" class="w-full mt-4 bg-white text-cyan-600 font-semibold py-3 rounded-xl shadow transition-all hover:bg-slate-50 flex items-center justify-center gap-2">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    Tambah Produk
                </button>

            </div>
            <!-- SELESAI BAGIAN PDAM -->

            <div id="transaksiList" class="space-y-3 mt-2"></div>

        </div>
        <div class="p-5 border-t bg-slate-50 flex gap-3">
            <button id="btnMenu" onclick="addMenu()" class="flex-1 bg-cyan-600 text-white py-3 rounded-xl font-semibold">+ MENU</button>
            <button id="btnKategori" onclick="addKategori()" class="flex-1 bg-amber-500 text-white py-3 rounded-xl font-semibold">+ KATEGORI</button>
        </div>
        <div class="px-5 pb-5">
            <button id="saveTransaksiBtn" onclick="confirmSaveTransaksi()" class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold disabled:opacity-50" disabled>SIMPAN SEMUA</button>
        </div>
    </div>
</div>

<!-- MODAL PREVIEW -->
<div id="previewModal" class="modal">
    <div class="modal-card max-w-sm">
        <div class="p-5 border-b flex items-center justify-between">
            <h3 class="font-bold text-lg">Preview Tampilan</h3>
            <button onclick="closePreview()" class="text-slate-400 hover:text-red-500"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div id="previewContent" class="p-5">
        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast">Berhasil disimpan</div>

<!-- CONFIRM MODAL -->
<div id="confirmModal" class="confirm-modal">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4">
        <h4 id="confirmTitle" class="font-bold text-lg mb-2"></h4>
        <p id="confirmText" class="text-slate-500 mb-6"></p>
        <div class="flex gap-3">
            <button id="confirmCancel" onclick="hideConfirm()" class="flex-1 py-3 rounded-xl border border-slate-300 font-semibold">BATAL</button>
            <button id="confirmOk" onclick="executeConfirm()" class="flex-1 bg-cyan-600 text-white py-3 rounded-xl font-semibold">YA</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script>
lucide.createIcons();

const namaKonter = document.getElementById('namaKonter');
const alamatKonter = document.getElementById('alamatKonter');
const ipNama = document.getElementById('ipNama');
const ipServer = document.getElementById('ipServer');
const ipHost = document.getElementById('ipHost');
const jabberNama = document.getElementById('jabberNama');
const jabberServer = document.getElementById('jabberServer');
const jabberHost = document.getElementById('jabberHost');
const waCenter = document.getElementById('waCenter');
const smsCenter = document.getElementById('smsCenter');

let originalServer = {};
let sortableInstance;

function escapeHtml(text){
    if(!text) return '';
    return text.toString()
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function autoGrow(el){
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
}

function enableButton(id){ document.getElementById(id).disabled = false; }
function disableButton(id){ document.getElementById(id).disabled = true; }

function toast(msg){
    const el = document.getElementById('toast');
    el.innerText = msg;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'), 2000);
}

let confirmCallback = null;
function showConfirm(title, text, cb, okText="YA", cancelText="BATAL"){
    document.getElementById('confirmTitle').innerText = title;
    document.getElementById('confirmText').innerText = text;
    document.getElementById('confirmOk').innerText = okText;
    document.getElementById('confirmCancel').innerText = cancelText;
    confirmCallback = cb;
    document.getElementById('confirmModal').classList.add('show');
}
function hideConfirm(){ document.getElementById('confirmModal').classList.remove('show'); confirmCallback = null; }
function executeConfirm(){ if(confirmCallback) confirmCallback(); hideConfirm(); }

function getServerData(){
    return { nama: namaKonter.value.trim(), alamat: alamatKonter.value.trim() };
}
function checkServerChange(){
    const current = getServerData();
    if(JSON.stringify(current) !== JSON.stringify(originalServer)) enableButton("saveServerBtn");
    else disableButton("saveServerBtn");
}
function openServer(){
    document.getElementById("serverModal").classList.add("show");
    loadServer();
}
function closeServer(){ document.getElementById("serverModal").classList.remove("show"); }
function saveServer(){
    localStorage.setItem("setupServer", JSON.stringify(getServerData()));
    toast("Data Server Disimpan");
    originalServer = getServerData();
    checkServerChange();
}
function confirmSaveServer(){ showConfirm("Konfirmasi Simpan", "Simpan perubahan Server?", saveServer); }
function checkCloseServer(){
    if(!document.getElementById("saveServerBtn").disabled){
        showConfirm("Perubahan Belum Disimpan", "Yakin ingin keluar?", closeServer, "Ya, Keluar");
        return;
    }
    closeServer();
}
function loadServer(){
    const data = JSON.parse(localStorage.getItem("setupServer"));
    if(data){
        namaKonter.value = data.nama || "";
        alamatKonter.value = data.alamat || "";
    } else {
        namaKonter.value = ""; alamatKonter.value = "";
    }
    originalServer = getServerData();
    [namaKonter, alamatKonter].forEach(autoGrow);
    checkServerChange();
}

function getCenterData(){
    return {
        ip: { nama: ipNama.value, server: ipServer.value, host: ipHost.value },
        jabber: { nama: jabberNama.value, server: jabberServer.value, host: jabberHost.value },
        nomor: { wa: waCenter.value, sms: smsCenter.value }
    };
}
function checkCenterChange(){
    const original = JSON.parse(localStorage.getItem("centerServer")) || {};
    const current = getCenterData();
    if(JSON.stringify(current) !== JSON.stringify(original)){
        enableButton("saveCenterBtn");
    } else {
        disableButton("saveCenterBtn");
    }
}
function openCenter(){
    document.getElementById("centerModal").classList.add("show");
    loadCenter();
    checkCenterChange();
}
function closeCenter(){
    document.getElementById("centerModal").classList.remove("show");
}
function saveCenter(){
    localStorage.setItem("centerServer", JSON.stringify(getCenterData()));
    toast("Data Center Disimpan");
    checkCenterChange();
}
function confirmSaveCenter(){
    showConfirm("Konfirmasi Simpan", "Simpan perubahan Center?", saveCenter);
}
function checkCloseCenter(){
    if(!document.getElementById("saveCenterBtn").disabled){
        showConfirm("Perubahan Belum Disimpan", "Yakin ingin keluar?", closeCenter, "Ya, Keluar");
        return;
    }
    closeCenter();
}
function loadCenter(){
    const data = JSON.parse(localStorage.getItem("centerServer"));
    if(data){
        ipNama.value = data.ip?.nama || "";
        ipServer.value = data.ip?.server || "";
        ipHost.value = data.ip?.host || "";
        jabberNama.value = data.jabber?.nama || "";
        jabberServer.value = data.jabber?.server || "";
        jabberHost.value = data.jabber?.host || "";
        waCenter.value = data.nomor?.wa || "";
        smsCenter.value = data.nomor?.sms || "";
    } else {
        ipNama.value = ""; ipServer.value = ""; ipHost.value = "";
        jabberNama.value = ""; jabberServer.value = ""; jabberHost.value = "";
        waCenter.value = ""; smsCenter.value = "";
    }
}

function watchServerChanges(){
    [namaKonter, alamatKonter].forEach(field=>{
        field.addEventListener("input", ()=>{
            checkServerChange();
            autoGrow(field);
        });
    });
}
function watchCenterChanges(){
    [
        ipNama, ipServer, ipHost,
        jabberNama, jabberServer, jabberHost,
        waCenter, smsCenter
    ].forEach(field=>{
        field.addEventListener("input", checkCenterChange);
    });
}

let transaksiItems = [];
let originalTransaksi = [];
let activeDeleteIndex = -1;

function getCurrentTransaksi(){
    return JSON.parse(JSON.stringify(transaksiItems));
}
function checkTransaksiChange(){
    if(JSON.stringify(getCurrentTransaksi()) !== JSON.stringify(originalTransaksi)){
        enableButton("saveTransaksiBtn");
    } else {
        disableButton("saveTransaksiBtn");
    }
    updateTransaksiInfo();
}

function openTransaksi(){
    document.getElementById("transaksiModal").classList.add("show");
    loadTransaksi();
    checkTransaksiChange();
}
function closeTransaksi(){
    if(!document.getElementById("saveTransaksiBtn").disabled){
        showConfirm("Perubahan Belum Disimpan", "Yakin ingin keluar tanpa simpan?", ()=>{
            document.getElementById("transaksiModal").classList.remove("show");
        }, "Ya, Keluar");
        return;
    }
    document.getElementById("transaksiModal").classList.remove("show");
}
function updateTransaksiInfo(){
    const totalMenu = transaksiItems.filter(item => item.type === "menu").length;
    const totalKategori = transaksiItems.filter(item => item.type === "kategori").length;
    document.getElementById("transaksiInfo").innerText = `${totalMenu} Menu • ${totalKategori} Kategori`;
}

function addMenu(){
    document.getElementById('btnMenu').classList.add('blink');
    setTimeout(() => { document.getElementById('btnMenu').classList.remove('blink'); }, 500);

    transaksiItems.unshift({
        type: "menu", nama: "Menu Baru", icon: "circle", iconFile: "", checked: false, showDelete: false
    });
    checkTransaksiChange();
    renderTransaksi();
    focusFirstInput();
}

function addKategori(){
    document.getElementById('btnKategori').classList.add('blink');
    setTimeout(() => { document.getElementById('btnKategori').classList.remove('blink'); }, 500);

    transaksiItems.unshift({
        type: "kategori", nama: "Kategori Baru", checked: false, showDelete: false
    });
    checkTransaksiChange();
    renderTransaksi();
    focusFirstInput();
}

function focusFirstInput(){
    setTimeout(()=>{
        const inputs = document.querySelectorAll("#transaksiList input[type='text']");
        if(inputs.length){ inputs[0].focus(); inputs[0].select(); }
    },100);
}

function updateTransaksi(index, value){
    transaksiItems[index].nama = value;
    checkTransaksiChange();
}

function handleInputClick(e, index){
    if(e.target.closest('.btn-delete')) return;

    if(activeDeleteIndex !== -1 && activeDeleteIndex !== index){
        hideAllDeleteButtons();
    }
}

function toggleDeleteButton(index){
    if(transaksiItems[index].type === "kategori") return;

    if(activeDeleteIndex === index){
        transaksiItems[index].showDelete = false;
        activeDeleteIndex = -1;
    } else {
        hideAllDeleteButtons();
        transaksiItems[index].showDelete = true;
        activeDeleteIndex = index;
    }
    renderTransaksi();
}

function hideAllDeleteButtons(){
    transaksiItems.forEach(item => {
        item.showDelete = false;
    });
    activeDeleteIndex = -1;
    renderTransaksi();
}

function renderTransaksi(){
    const list = document.getElementById("transaksiList");
    list.innerHTML = "";

    transaksiItems.forEach((item, index)=>{
        const div = document.createElement("div");
        const safeName = escapeHtml(item.nama);

        if(item.type === "kategori"){
            div.innerHTML = `
            <div class="bg-gradient-to-r from-amber-400 to-orange-500 text-white rounded-2xl p-3 shadow-lg">
                <div class="flex items-center gap-3 h-10">
                    <div onclick="event.stopPropagation(); toggleTransaksi(${index})">
                        <input type="checkbox" ${item.checked ? "checked" : ""} class="w-5 h-5">
                    </div>
                    <i data-lucide="folder-open"></i>
                    <input type="text" value="${safeName}" class="flex-1 bg-transparent outline-none font-bold text-lg" onclick="handleInputClick(event, ${index})" oninput="updateTransaksi(${index}, this.value)">
                </div>
            </div>`;
        } else {
            div.innerHTML = `
            <div class="bg-white rounded-2xl p-3 shadow-lg border border-slate-200 relative">
                <div class="flex items-center gap-3 h-10">
                    <div onclick="event.stopPropagation(); toggleTransaksi(${index})">
                        <input type="checkbox" ${item.checked ? "checked" : ""} class="w-5 h-5">
                    </div>
                    <div onclick="event.stopPropagation(); toggleDeleteButton(${index})" class="w-12 h-12 rounded-xl border border-slate-300 bg-transparent flex items-center justify-center overflow-hidden cursor-pointer">
                        ${item.iconFile ? `<img src="${item.iconFile}" class="w-full h-full object-cover">` : `<i data-lucide="${item.icon}" class="text-cyan-600"></i>`}
                    </div>
                    <span class="font-semibold text-gray-700">${safeName}</span>
                    
                    <button onclick="event.stopPropagation(); deleteTransaksi(${index})" class="btn-delete absolute right-3 top-1/2 -translate-y-1/2 bg-red-500 text-white p-2 rounded-full ${item.showDelete ? 'flex' : 'hidden'}">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>`;
        }

        list.appendChild(div);
    });
    lucide.createIcons();
}

function toggleTransaksi(index){
    hideAllDeleteButtons();
    transaksiItems[index].checked = !transaksiItems[index].checked;
    checkTransaksiChange();
    renderTransaksi();
}

function deleteTransaksi(index){
    const item = transaksiItems[index];

    if(item.checked){
        showConfirm("Gagal Hapus", "Menu yang aktif tidak bisa dihapus!", null, "Oke Mengerti");
        return;
    }

    const namaItem = item.nama;
    showConfirm("Konfirmasi Hapus", `Hapus "${namaItem}"?`, ()=>{
        transaksiItems.splice(index,1);
        activeDeleteIndex = -1;
        checkTransaksiChange();
        renderTransaksi();
    }, "Ya, Hapus");
}

function initSortable(){
    const list = document.getElementById("transaksiList");
    if(!list) return;
    if(sortableInstance) sortableInstance.destroy();
    sortableInstance = new Sortable(list, {
        animation:150,
        handle:".drag-handle",
        onStart: function() {
            hideAllDeleteButtons();
        },
        onEnd:function(evt){
            const movedItem = transaksiItems.splice(evt.oldIndex,1)[0];
            transaksiItems.splice(evt.newIndex,0,movedItem);
            checkTransaksiChange();
        }
    });
}

function saveTransaksi(){
    localStorage.setItem("transaksiItems", JSON.stringify(transaksiItems));
    originalTransaksi = JSON.parse(JSON.stringify(transaksiItems));
    toast("Menu Transaksi Disimpan");
    checkTransaksiChange();
}
function loadTransaksi(){
    const data = JSON.parse(localStorage.getItem("transaksiItems"));
    if(data){
        transaksiItems = data;
    } else {
        transaksiItems = [
            {type:"kategori", nama:"PRODUK DIGITAL", checked:false, showDelete:false},
            {type:"menu", nama:"Pulsa Reguler", icon:"smartphone", iconFile:"", checked:false, showDelete:false},
            {type:"menu", nama:"Paket Data", icon:"wifi", iconFile:"", checked:false, showDelete:false}
        ];
    }
    originalTransaksi = JSON.parse(JSON.stringify(transaksiItems));
    renderTransaksi();
    updateTransaksiInfo();
}

function changeIcon(index){
    const icons = ["smartphone", "wifi", "droplet", "zap", "gamepad-2", "tv", "wallet", "credit-card", "dollar-sign", "gift"];
    const current = transaksiItems[index].icon;
    let idx = icons.indexOf(current);
    idx = (idx + 1) % icons.length;
    transaksiItems[index].icon = icons[idx];
    checkTransaksiChange();
    renderTransaksi();
}

function confirmSaveTransaksi(){
    showConfirm("Konfirmasi Simpan", "Simpan perubahan Menu Transaksi?", saveTransaksi);
}

function openPreview(){
    const modal = document.getElementById("previewModal");
    const content = document.getElementById("previewContent");

    let html = "";
    const serverData = JSON.parse(localStorage.getItem("setupServer")) || { nama:"Nama Konter", alamat:"Alamat Konter" };

    html += `
    <div class="bg-gradient-to-r from-cyan-600 to-blue-600 rounded-3xl p-6 text-white shadow-lg mb-6">
        <div class="text-center">
            <h2 class="text-2xl font-bold">${escapeHtml(serverData.nama)}</h2>
            <p class="text-sm opacity-90 mt-1">${escapeHtml(serverData.alamat)}</p>
        </div>
    </div>
    `;

    transaksiItems.forEach(item=>{
        if(item.type === "kategori"){
            html += `
            <div class="bg-gradient-to-r from-amber-400 to-orange-500 text-white rounded-2xl p-3 shadow-lg mb-4">
                <h3 class="font-bold text-lg">${escapeHtml(item.nama)}</h3>
            </div>
            `;
        } else {
            if(item.checked){
                html += `
                <div class="bg-white rounded-2xl p-3 shadow-lg mb-3 flex items-center gap-4 border border-slate-200">
                    <div class="w-12 h-12 rounded-xl border border-slate-300 bg-transparent flex items-center justify-center overflow-hidden">
                        ${item.iconFile ? `<img src="${item.iconFile}" class="w-full h-full object-cover">` : `<i data-lucide="${item.icon}" class="text-cyan-600"></i>`}
                    </div>
                    <span class="font-semibold text-gray-700">${escapeHtml(item.nama)}</span>
                </div>
                `;
            }
        }
    });

    content.innerHTML = html;
    modal.classList.add("show");
    setTimeout(() => { lucide.createIcons(); }, 50);
}

function closePreview(){
    document.getElementById("previewModal").classList.remove("show");
}

// === FUNGSI TAMBAH PRODUK PDAM ===
let pdamCounter = 1;

function tambahProdukPDAM(){
    const container = document.getElementById("pdamContainer");
    
    const newItem = document.createElement("div");
    newItem.className = "bg-white rounded-xl p-4 text-slate-700";
    newItem.innerHTML = `
        <div class="space-y-3">
            <div class="input-group">
                <input type="text" id="wilayah${pdamCounter}" placeholder=" ">
                <label>Wilayah</label>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="input-group">
                    <input type="text" id="cek${pdamCounter}" placeholder=" ">
                    <label>Kode Cek</label>
                </div>
                <div class="input-group">
                    <input type="text" id="bayar${pdamCounter}" placeholder=" ">
                    <label>Kode Bayar</label>
                </div>
            </div>
        </div>
    `;
    
    container.appendChild(newItem);
    pdamCounter++;
    
    // Animasi muncul
    newItem.style.opacity = "0";
    newItem.style.transform = "translateY(-10px)";
    setTimeout(() => {
        newItem.style.transition = "all 0.3s ease";
        newItem.style.opacity = "1";
        newItem.style.transform = "translateY(0)";
    }, 10);
}

// === INISIALISASI AWAL ===
window.onload = function(){
    renderMenus();
    watchServerChanges();
    watchCenterChanges();
    loadTransaksi();
};
</script>
