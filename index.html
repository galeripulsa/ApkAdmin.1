<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel Admin Lengkap</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
    body { background: #f1f5f9; transition: background 0.3s; }
    body.dark { background: #0f172a; }
    .card-menu { transition: all .25s; }
    .card-menu:hover { transform: translateY(-4px); }
    .modal { display: none; }
    .modal.show { display: flex; }
    .floating { position: relative; margin-top:20px; }
    .floating input, .floating textarea {
        width:100%; border:1px solid #cbd5e1; border-radius:12px;
        padding:14px; outline:none; background:white; resize:none;
    }
    body.dark .floating input, body.dark .floating textarea {
        background:#1e293b; border-color:#475569; color:white;
    }
    .floating label {
        position:absolute; left:12px; top:14px; background:white;
        padding:0 6px; color:#94a3b8; transition:.2s; pointer-events:none;
    }
    body.dark .floating label { background:#1e293b; }
    .floating input:focus + label,
    .floating input:not(:placeholder-shown) + label,
    .floating textarea:focus + label,
    .floating textarea:not(:placeholder-shown) + label {
        top:-10px; font-size:12px; color:#06b6d4;
    }
    .toast {
        position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
        background:#16a34a; color:white; padding:12px 20px; border-radius:10px;
        display:none; z-index:9999;
    }
    .drag-handle { cursor: grab; touch-action: none; }
    .drag-handle:active { cursor: grabbing; }
    .sortable-ghost { opacity:.4; background:#93c5fd !important; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }
    .blink { animation: blink .5s ease-in-out 1; }
    .btn-click:active { transform: scale(0.95); transition: transform .1s; }
</style>
</head>
<body class="max-w-screen-md mx-auto p-4">

<!-- HEADER -->
<div class="bg-gradient-to-r from-cyan-500 to-blue-600 rounded-3xl p-6 text-white shadow-lg">
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
            <i data-lucide="layout-grid" class="w-10 h-10"></i>
            <div>
                <h1 class="text-2xl font-bold">Panel Admin</h1>
                <p class="text-sm opacity-90">Sistem Menu Lengkap</p>
            </div>
        </div>
        <button id="themeToggle" onclick="toggleTheme()" class="bg-white/20 p-3 rounded-xl hover:bg-white/30 transition">
            <i data-lucide="moon" class="w-6 h-6"></i>
        </button>
    </div>
    <div class="mt-4 flex gap-2">
        <button onclick="hideAllDeleteButtons(); addItem('kategori')" class="flex-1 bg-white text-cyan-600 py-3 rounded-xl font-bold shadow transition">+ Kategori</button>
        <button onclick="hideAllDeleteButtons(); addItem('menu')" class="flex-1 bg-white text-cyan-600 py-3 rounded-xl font-bold shadow transition">+ Menu</button>
    </div>
</div>

<!-- STATS -->
<div class="bg-white dark:bg-slate-800 rounded-2xl p-4 mt-4 shadow">
    <div id="infoText" class="text-center text-slate-600 dark:text-slate-300 font-medium">Memuat data...</div>
</div>

<!-- LIST ITEMS -->
<div id="itemList" class="mt-4 space-y-3"></div>

<!-- TOAST -->
<div id="toast" class="toast">Berhasil disimpan!</div>

<script>
let items = [];
let sortable = null;
let activeSwipe = -1;

// --- THEME MODE ---
function toggleTheme() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    document.querySelector('#themeToggle i').outerHTML = isDark 
        ? '<i data-lucide="sun" class="w-6 h-6"></i>' 
        : '<i data-lucide="moon" class="w-6 h-6"></i>';
    lucide.createIcons();
}

// --- LOCAL STORAGE ---
function saveData() {
    localStorage.setItem('menuData', JSON.stringify(items));
    updateInfo();
    toast('Data tersimpan!');
}
function loadData() {
    const saved = localStorage.getItem('menuData');
    if(saved) items = JSON.parse(saved);
    const theme = localStorage.getItem('theme');
    if(theme === 'dark') document.body.classList.add('dark');
    renderList();
}

function updateInfo() {
    const kat = items.filter(i => i.type === 'kategori').length;
    const menu = items.filter(i => i.type === 'menu').length;
    infoText.innerText = `${kat} Kategori • ${menu} Menu`;
}

function toast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.display = 'block';
    setTimeout(()=>t.style.display='none', 2000);
}

// --- CRUD FUNCTIONS ---
function addItem(type) {
    const newItem = {
        id: Date.now(),
        type: type,
        name: type === 'kategori' ? 'Kategori Baru' : 'Menu Baru',
        icon: type === 'kategori' ? 'folder' : 'circle',
        active: false,
        swiped: false
    }
    items.unshift(newItem);
    saveData();
    renderList();
}

function deleteItem(id) {
    const idx = items.findIndex(i => i.id == id);
    if(items[idx].active) return toast('Aktif tidak bisa dihapus!');
    if(confirm(`Hapus ${items[idx].name}?`)) {
        items.splice(idx, 1);
        saveData();
        renderList();
    }
}

function updateName(id, val) {
    const it = items.find(i => i.id == id);
    if(it) { it.name = val; saveData(); }
}

function toggleActive(id) {
    hideAllDeleteButtons();
    items.forEach(i => i.active = false);
    const it = items.find(i => i.id == id);
    if(it) it.active = !it.active;
    saveData();
    renderList();
}

// --- SWIPE & HIDE LOGIC ---
function hideAllDeleteButtons() {
    items.forEach(i => i.swiped = false);
    activeSwipe = -1;
    renderList();
}

function handleSwipe(id, index) {
    items.forEach((i, idx) => i.swiped = (idx === index));
    activeSwipe = index;
    renderList();
}

function handleInputClick() {
    if(activeSwipe !== -1) hideAllDeleteButtons();
}

// --- RENDER ---
function renderList() {
    const list = document.getElementById('itemList');
    list.innerHTML = '';

    items.forEach((item, idx) => {
        const div = document.createElement('div');
        const isCat = item.type === 'kategori';
        const bg = isCat 
            ? 'bg-gradient-to-r from-amber-400 to-orange-500 text-white' 
            : 'bg-white dark:bg-slate-800 text-slate-800 dark:text-white border border-slate-200 dark:border-slate-700';

        div.innerHTML = `
        <div class="${bg} rounded-2xl p-4 shadow-lg relative overflow-hidden">
            <div class="flex items-center gap-3 h-12 relative z-10">
                <div onclick="event.stopPropagation(); toggleActive(${item.id})" 
                     class="w-8 h-8 border-2 rounded-lg flex items-center justify-center cursor-pointer ${item.active ? 'border-white bg-white/20' : 'border-current opacity-50'}">
                    ${item.active ? '<i data-lucide="check" class="w-5 h-5"></i>' : ''}
                </div>
                
                <div onclick="openIconPicker(${item.id})" class="cursor-pointer">
                    ${item.icon ? `<i data-lucide="${item.icon}" class="w-7 h-7"></i>` : ''}
                </div>

                <input type="text" value="${item.name}" 
                       class="flex-1 bg-transparent outline-none font-bold text-lg"
                       onclick="handleInputClick();"
                       oninput="updateName(${item.id}, this.value)">

                <div class="flex items-center gap-2">
                    ${item.swiped ? `
                    <button onclick="deleteItem(${item.id})" 
                            class="bg-red-500 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                    ` : ''}
                    
                    <div class="drag-handle opacity-50 hover:opacity-100">
                        <i data-lucide="grip-vertical" class="w-6 h-6"></i>
                    </div>
                </div>
            </div>
        </div>`;

        // Swipe Event
        let startX = 0;
        div.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        div.addEventListener('touchend', e => {
            const endX = e.changedTouches[0].clientX;
            const diff = startX - endX;
            if(Math.abs(diff) > 50) {
                if(diff > 0) handleSwipe(item.id, idx); // swipe left show delete
                else hideAllDeleteButtons(); // swipe right hide
            }
        });

        list.appendChild(div);
    });

    lucide.createIcons();
    initSortable();
}

// --- DRAG SORT ---
function initSortable() {
    if(sortable) sortable.destroy();
    sortable = new Sortable(itemList, {
        animation: 150,
        handle: '.drag-handle',
        onStart: () => hideAllDeleteButtons(),
        onEnd: evt => {
            const moved = items.splice(evt.oldIndex, 1)[0];
            items.splice(evt.newIndex, 0, moved);
            saveData();
        }
    });
}

// --- ICON PICKER SIMULATION ---
function openIconPicker(id) {
    hideAllDeleteButtons();
    const list = ['home','settings','user','shop','credit-card','wifi','package','gift','star','heart','message','phone'];
    let html = `<div class="grid grid-cols-6 gap-4 p-4">`;
    list.forEach(ic => {
        html += `
        <button onclick="setIcon(${id}, '${ic}')" class="p-3 bg-slate-100 dark:bg-slate-700 rounded-xl hover:bg-cyan-100 dark:hover:bg-cyan-900">
            <i data-lucide="${ic}" class="w-6 h-6"></i>
        </button>`;
    });
    html += `</div>`;
    alert('Pilih Icon:\n(Klik tombol di bawah)\n' + list.join(', ')); // Simplified
    // Bisa di-expand jadi modal popup icon browser
}
function setIcon(id, ic) {
    const it = items.find(i => i.id == id);
    if(it) { it.icon = ic; saveData(); renderList(); }
}

// --- INIT ---
window.onload = () => {
    loadData();
    lucide.createIcons();
};
</script>
</body>
</html>
